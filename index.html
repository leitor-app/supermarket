<script>
    const URL_BANCO = 'https://vnpoanckjsjggqqtlpxk.supabase.co';
    const CHAVE_ANON = 'sb_publishable_wzxmqxBXAq2s9krb3Q-Eiw_4gHowgs7';
    const supabaseClient = supabase.createClient(URL_BANCO, CHAVE_ANON);

    let html5QrCode;
    let eanAtual = "";
    let fotoUrlTemporaria = ""; // Guarda a foto da web se precisar salvar

    window.onload = carregarMercados;

    async function carregarMercados() {
      const { data } = await supabaseClient.from('supermercados').select('id, nome').order('nome');
      const select = document.getElementById('selectMercado');
      if (data) {
        select.innerHTML = '<option value="">Selecione o Mercado...</option>';
        data.forEach(m => {
          let opt = document.createElement('option');
          opt.value = m.id; opt.innerText = m.nome;
          select.appendChild(opt);
        });
      }
    }

    function toggleScanner() {
      const readerDiv = document.getElementById('reader');
      if (readerDiv.style.display === 'block') { pararScanner(); } 
      else { readerDiv.style.display = 'block'; iniciarScanner(); }
    }

    function iniciarScanner() {
      html5QrCode = new Html5Qrcode("reader");
      html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 150 } }, 
        (decodedText) => {
          document.getElementById('barcodeInput').value = decodedText;
          pararScanner();
          if (navigator.vibrate) navigator.vibrate(100);
          buscarHibrida();
        }
      ).catch(err => alert("Erro ao abrir câmera."));
    }

    function pararScanner() {
      if (html5QrCode) {
        html5QrCode.stop().then(() => { document.getElementById('reader').style.display = 'none'; });
      }
    }

    // --- NOVA BUSCA HÍBRIDA (SUPABASE + WEB) ---
    async function buscarHibrida() {
      const termo = document.getElementById('barcodeInput').value.trim();
      if (!termo) return;

      // 1. Tenta no SEU Banco Primeiro
      const { data, error } = await supabaseClient
        .from('produtos')
        .select(`id, nome, foto_url, precos (valor, data_coleta, supermercado_id, supermercados (nome))`)
        .or(`id.eq.${termo},nome.ilike.%${termo}%`)
        .maybeSingle();

      if (data) {
        exibirResultados(data, false);
      } else {
        // 2. Se for código numérico e não achou no banco, tenta na Web
        if (!isNaN(termo) && termo.length >= 8) {
          buscarNaWeb(termo);
        } else {
          alert("Produto não encontrado no banco.");
        }
      }
    }

    async function buscarNaWeb(ean) {
      try {
        const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${ean}.json`);
        const json = await res.json();

        if (json.status === 1) {
          const produtoWeb = {
            id: ean,
            nome: json.product.product_name || "Produto Desconhecido",
            foto_url: json.product.image_url || ""
          };
          // Exibe como sugestão para cadastro
          exibirResultados(produtoWeb, true);
        } else {
          alert("Produto não encontrado nem no banco, nem na internet.");
        }
      } catch (e) {
        alert("Erro ao consultar a base web.");
      }
    }

    function exibirResultados(produto, ehNovo) {
      eanAtual = produto.id;
      fotoUrlTemporaria = produto.foto_url;
      
      document.getElementById('areaResultado').style.display = 'block';
      document.getElementById('resNome').innerText = produto.nome;
      document.getElementById('resEan').innerText = "EAN: " + produto.id;
      document.getElementById('resFoto').src = produto.foto_url || "https://via.placeholder.com/50";
      
      const listaDiv = document.getElementById('listaPrecos');
      listaDiv.innerHTML = "";
      
      if (ehNovo) {
        listaDiv.innerHTML = "<p style='color:#fbbf24; font-size:0.8em; margin:0;'>✨ Sugestão da Web encontrada! Complete os dados abaixo para salvar no seu banco.</p>";
      } else if (produto.precos && produto.precos.length > 0) {
        const ultimos = {};
        produto.precos.forEach(p => {
          if (!ultimos[p.supermercado_id] || new Date(p.data_coleta) > new Date(ultimos[p.supermercado_id].data_coleta)) {
            ultimos[p.supermercado_id] = p;
          }
        });
        const lista = Object.values(ultimos).sort((a,b) => a.valor - b.valor);
        lista.forEach(p => {
          const card = document.createElement('div');
          card.className = `card-preco ${p.valor === lista[0].valor ? 'mais-barato' : ''}`;
          card.onclick = () => {
            document.getElementById('selectMercado').value = p.supermercado_id;
            document.getElementById('inputPreco').value = p.valor;
          };
          card.innerHTML = `<span>${p.supermercados.nome}</span><span class="valor-loja">R$ ${p.valor.toFixed(2)}</span>`;
          listaDiv.appendChild(card);
        });
      }
    }

    async function salvarNovoPreco() {
      const preco = document.getElementById('inputPreco').value;
      const mercadoId = document.getElementById('selectMercado').value;
      const nomeProd = document.getElementById('resNome').innerText;

      if (!preco || !mercadoId) return alert("Preencha preço e loja!");

      // 1. Garantir que o produto existe na tabela 'produtos' (Upsert)
      const { error: errorProd } = await supabaseClient
        .from('produtos')
        .upsert({ id: eanAtual, nome: nomeProd, foto_url: fotoUrlTemporaria });

      if (errorProd) return alert("Erro ao criar produto: " + errorProd.message);

      // 2. Salvar o Preço
      const { error: errorPreco } = await supabaseClient.from('precos').insert([{
        produto_id: eanAtual, 
        valor: parseFloat(preco),
        supermercado_id: parseInt(mercadoId), 
        data_coleta: new Date().toISOString()
      }]);

      if (errorPreco) {
        alert("Erro ao salvar preço: " + errorPreco.message);
      } else {
        alert("✅ Salvo com sucesso!");
        buscarHibrida();
      }
    }

    async function cadastrarLoja() {
      const nome = prompt("Novo Supermercado:");
      if (nome) {
        await supabaseClient.from('supermercados').insert([{ nome: nome }]);
        carregarMercados();
      }
    }
  </script>
