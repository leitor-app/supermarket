<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supermarket Scanner</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* Cole aqui o seu CSS do Smart Scanner original */
    body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; padding: 20px; }
    .container { max-width: 450px; margin: auto; }
    input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; }
    .btn { width: 100%; padding: 15px; background: #10b981; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 12px; }
  </style>
</head>
<body>

  <div class="container">
    <h1>Supermarket Scanner</h1>
    <p>Conectado ao Supabase</p>

    <input type="text" id="barcode" placeholder="Escaneie ou digite o código">
    <button class="btn" onclick="buscarProduto()">Buscar Produto</button>

    <div id="resultado" style="margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.1); border-radius: 10px; display: none;">
      <h3 id="prodNome"></h3>
      <p id="prodPreco"></p>
    </div>
  </div>

  <script>
    // ==========================================
    // CONFIGURAÇÃO DO SUPABASE
    // ==========================================
    // Substitua pelos dados que aparecem no seu painel do Supabase (Project Settings > API)
    const SUPABASE_URL = 'SUA_URL_AQUI';
    const SUPABASE_KEY = 'SUA_ANON_KEY_AQUI';

    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // ==========================================
    // FUNÇÃO DE BUSCA (A MÁGICA ACONTECE AQUI)
    // ==========================================
    async function buscarProduto() {
      const codigo = document.getElementById('barcode').value;
      const resDiv = document.getElementById('resultado');

      // No Supabase, a busca é uma linha só, sem loops manuais!
      const { data, error } = await supabase
        .from('produtos')
        .select(`
          nome, 
          foto_url, 
          precos (valor, data_hora, mercados (nome))
        `)
        .eq('id', codigo)
        .single();

      if (error) {
        console.log("Produto não encontrado no banco:", error.message);
        alert("Produto não cadastrado ainda!");
        return;
      }

      if (data) {
        resDiv.style.display = 'block';
        document.getElementById('prodNome').innerText = data.nome;
        
        // Pega o último preço cadastrado (o Supabase já traz a lista)
        const ultimoPreco = data.precos[0] ? `R$ ${data.precos[0].valor}` : "Sem preço";
        document.getElementById('prodPreco').innerText = "Último preço: " + ultimoPreco;
      }
    }
  </script>
</body>
</html>
