<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Scanner v10.1.4 - Cadastro Completo</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #10b981; --bg: #0f172a; --card: rgba(30, 41, 59, 0.8); --warning: #fbbf24; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .smart-card { width: 100%; max-width: 420px; background: var(--card); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 20px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5); backdrop-filter: blur(15px); position: relative; }
        .version-tag { position: absolute; top: 10px; right: 20px; font-size: 0.6em; color: rgba(255,255,255,0.3); font-weight: bold; }
        h1 { text-align: center; color: var(--primary); font-size: 1.6rem; margin: 0; font-weight: 700; }
        .subtitle { text-align: center; color: rgba(255, 255, 255, 0.5); font-size: 0.8em; margin-bottom: 15px; }
        label { font-size: 0.7em; color: #94a3b8; text-transform: uppercase; font-weight: 700; margin-top: 15px; display: block; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.1); background: #0f172a; color: white; box-sizing: border-box; font-size: 1em; }
        
        .autocomplete-list { position: absolute; width: calc(100% - 40px); background: #1e293b; border: 1px solid #334155; border-radius: 0 0 12px 12px; max-height: 200px; overflow-y: auto; z-index: 100; display: none; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .suggestion-item { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; display: flex; align-items: center; }
        .suggestion-item img { width: 30px; height: 30px; border-radius: 4px; margin-right: 10px; object-fit: contain; }

        .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { padding: 12px; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 12px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-cam { background: var(--primary); }
        .btn-search { background: transparent; border: 2px solid #334155; }
        
        #reader { width: 100%; border-radius: 12px; overflow: hidden; margin-top: 15px; display: none; border: 2px solid var(--primary); }
        #areaResultado { display: none; margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
        .product-header { display: flex; align-items: center; margin-bottom: 15px; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 12px; }
        .product-header img { width: 50px; height: 50px; object-fit: contain; background: white; border-radius: 8px; margin-right: 12px; }
        
        .scroll-precos { max-height: 180px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        .card-preco { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .card-preco.mais-barato { border-left: 4px solid var(--primary); background: rgba(16, 185, 129, 0.08); }
        .valor-loja { color: var(--primary); font-weight: 800; }

        .price-form { background: rgba(16, 185, 129, 0.05); padding: 15px; border-radius: 15px; border: 1px solid rgba(16, 185, 129, 0.2); }
        .btn-save { width: 100%; background: var(--primary); margin-top: 10px; }
        
        /* NOVO: Estilo para cadastro de produto */
        #areaNovoCadastro { display: none; border-top: 2px dashed var(--warning); padding-top: 15px; margin-top: 20px; animation: fadeIn 0.4s ease; }
        .status-badge { background: var(--warning); color: #000; font-size: 0.7em; font-weight: bold; padding: 3px 8px; border-radius: 20px; }
        .btn-foto { background: #334155; color: white; width: 100%; margin-top: 10px; }
        #previewFoto { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; border: 2px solid var(--warning); display: none; margin: 10px auto; }

        .action-group { margin-top: 20px; display: flex; flex-direction: column; gap: 8px; }
        .btn-action { background: rgba(255, 255, 255, 0.02); border: 1px solid #334155; color: #cbd5e1; border-radius: 12px; padding: 10px 15px; text-align: left; font-size: 0.85em; display: flex; align-items: center; cursor: pointer; }
        .btn-action i { width: 25px; color: var(--primary); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="smart-card">
        <div class="version-tag">VERSÃO 10.1.4</div>
        <h1>Smart Scanner</h1>
        <p class="subtitle">Produtos e Preços na sua Planilha</p>
        
        <label>Pesquisar por Código ou Nome</label>
        <input type="text" id="barcodeInput" placeholder="Escaneie ou digite..." oninput="buscarSugestoes()" autocomplete="off">
        <div id="autocompleteList" class="autocomplete-list"></div>
        
        <div class="button-group">
            <button class="btn btn-cam" onclick="toggleScanner()"><i class="fas fa-camera"></i> Câmera</button>
            <button class="btn btn-search" onclick="buscarHibrida()">🔍 Buscar</button>
        </div>

        <div id="reader"></div>

        <div id="areaResultado">
            <div class="product-header">
                <img id="resFoto" src="">
                <div>
                    <h3 id="resNome" style="margin:0; font-size:0.9em;"></h3>
                    <small id="resEan" style="color:#64748b; font-size:0.7em;"></small>
                </div>
            </div>
            <div id="listaPrecos" class="scroll-precos"></div>
        </div>

        <div id="areaNovoCadastro">
            <div style="text-align:center; margin-bottom:10px;"><span class="status-badge">PRODUTO NÃO CADASTRADO</span></div>
            <p style="font-size:0.8em; color:#94a3b8; text-align:center; margin:0;">Não encontramos esse item. Cadastre-o agora para começar a comparar preços!</p>
            
            <label>Nome do Produto Novo (Obrigatório)</label>
            <input type="text" id="novoNome" placeholder="Ex: Arroz Tio João 5kg">
            
            <label>Foto do Produto (Opcional)</label>
            <button class="btn btn-foto" onclick="document.getElementById('inputArquivoFoto').click()">
                <i class="fas fa-camera"></i> TIRAR FOTO
            </button>
            <input type="file" id="inputArquivoFoto" accept="image/*" capture="environment" style="display:none" onchange="previewFoto(this)">
            <img id="previewFoto" src="">
        </div>

        <div class="price-form" id="areaFormularioPreco" style="display:none; margin-top:15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top:10px;">
            <label>Novo Preço R$</label>
            <input type="number" id="inputPreco" step="0.01" placeholder="0.00">
            <select id="selectMercado" style="margin-top: 10px;">
                <option value="">Selecione o Mercado...</option>
            </select>
            <button class="btn btn-save" id="btnFinalizar" onclick="salvarTudo()">💾 SALVAR NO BANCO</button>
        </div>

        <div class="action-group">
            <button class="btn btn-action"><i class="fas fa-file-invoice-dollar"></i> Ler Comprovante com IA</button>
            <button class="btn btn-action"><i class="fas fa-clipboard-list"></i> Minha Lista de Compras</button>
            <button class="btn btn-action" onclick="cadastrarLoja()"><i class="fas fa-store"></i> Cadastrar Supermercado</button>
        </div>
    </div>

    <script>
        const URL_BANCO = 'https://vnpoanckjsjggqqtlpxk.supabase.co';
        const CHAVE_ANON = 'sb_publishable_wzxmqxBXAq2s9krb3Q-Eiw_4gHowgs7';
        const supabaseClient = supabase.createClient(URL_BANCO, CHAVE_ANON);

        let html5QrCode, eanAtual, timeoutBusca, fotoUrlTemporaria = "";
        let arquivoFotoParaUpload = null;
        let ehProdutoNovo = false;

        window.onload = carregarMercados;

        async function carregarMercados() {
            const { data } = await supabaseClient.from('supermercados').select('id, nome').order('nome');
            const select = document.getElementById('selectMercado');
            if (data) {
                select.innerHTML = '<option value="">Selecione o Mercado...</option>';
                data.forEach(m => {
                    let opt = document.createElement('option');
                    opt.value = m.id; opt.innerText = m.nome;
                    select.appendChild(opt);
                });
            }
        }

        async function buscarSugestoes() {
            const termo = document.getElementById('barcodeInput').value.trim();
            const lista = document.getElementById('autocompleteList');
            if (termo.length < 2) { lista.style.display = 'none'; resetarEstados(); return; }

            clearTimeout(timeoutBusca);
            timeoutBusca = setTimeout(async () => {
                const { data } = await supabaseClient.from('produtos').select('id, nome, foto_url').ilike('nome', `%${termo}%`).limit(5);
                if (data && data.length > 0) {
                    lista.innerHTML = ""; lista.style.display = 'block';
                    data.forEach(p => {
                        const item = document.createElement('div');
                        item.className = 'suggestion-item';
                        item.innerHTML = `<img src="${p.foto_url || ''}"><div>${p.nome}</div>`;
                        item.onclick = () => { document.getElementById('barcodeInput').value = p.id; lista.style.display = 'none'; buscarHibrida(); };
                        lista.appendChild(item);
                    });
                } else { lista.style.display = 'none'; }
            }, 300);
        }

        function toggleScanner() {
            const readerDiv = document.getElementById('reader');
            if (readerDiv.style.display === 'block') { pararScanner(); } 
            else { readerDiv.style.display = 'block'; iniciarScanner(); }
        }

        function iniciarScanner() {
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
                document.getElementById('barcodeInput').value = text;
                pararScanner();
                buscarHibrida();
            }).catch(() => alert("Erro ao abrir câmera."));
        }

        function pararScanner() {
            if (html5QrCode) html5QrCode.stop().then(() => { document.getElementById('reader').style.display = 'none'; });
        }

        function resetarEstados() {
            ehProdutoNovo = false;
            arquivoFotoParaUpload = null;
            fotoUrlTemporaria = "";
            document.getElementById('previewFoto').style.display = 'none';
            document.getElementById('previewFoto').src = '';
            document.getElementById('novoNome').value = '';
            document.getElementById('areaResultado').style.display = 'none';
            document.getElementById('areaNovoCadastro').style.display = 'none';
            document.getElementById('areaFormularioPreco').style.display = 'none';
            document.getElementById('btnFinalizar').innerHTML = "💾 SALVAR NO BANCO";
            document.getElementById('btnFinalizar').disabled = false;
        }

        async function buscarHibrida() {
            const termo = document.getElementById('barcodeInput').value.trim();
            if (!termo) return;
            resetarEstados();
            document.getElementById('autocompleteList').style.display = 'none';

            const { data } = await supabaseClient.from('produtos').select(`id, nome, foto_url, precos (valor, data_coleta, supermercado_id, supermercados (nome))`).or(`id.eq.${termo},nome.ilike.%${termo}%`).maybeSingle();

            if (data) {
                exibirResultados(data, false);
            } else if (!isNaN(termo) && termo.length >= 8) {
                // É um código numérico válido e não achou no banco, tenta web
                buscarNaWeb(termo);
            } else {
                // Não é código ou não achou nada, mas não deixa cadastrar sem código válido
                alert("Produto não encontrado.");
            }
        }

        async function buscarNaWeb(ean) {
            try {
                const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${ean}.json`);
                const json = await res.json();
                if (json.status === 1) {
                    exibirResultados({ id: ean, nome: json.product.product_name || "Desconhecido", foto_url: json.product.image_url || "" }, true);
                } else {
                    // CÓDIGO VÁLIDO MAS NÃO ACHOU NA WEB: ATIVA CADASTRO DE NOVO PRODUTO
                    ativarModoNovoProduto(ean);
                }
            } catch (e) { alert("Erro ao conectar na Web."); }
        }

        function exibirResultados(produto, ehWeb) {
            eanAtual = produto.id;
            fotoUrlTemporaria = produto.foto_url;
            document.getElementById('areaResultado').style.display = 'block';
            document.getElementById('areaFormularioPreco').style.display = 'block';
            document.getElementById('resNome').innerText = produto.nome;
            document.getElementById('resEan').innerText = "EAN: " + produto.id;
            document.getElementById('resFoto').src = produto.foto_url || "https://via.placeholder.com/50";
            
            const listaDiv = document.getElementById('listaPrecos');
            listaDiv.innerHTML = ehWeb ? "<p style='color:#fbbf24; font-size:0.7em; font-weight:bold;'>✨ Encontrado na Web! Complete para salvar no seu banco.</p>" : "";
            
            if (!ehWeb && produto.precos) {
                const u = {}; produto.precos.forEach(p => { if(!u[p.supermercado_id] || new Date(p.data_coleta) > new Date(u[p.supermercado_id].data_coleta)) u[p.supermercado_id] = p; });
                const ord = Object.values(u).sort((a,b) => a.valor - b.valor);
                ord.forEach(p => {
                    const card = document.createElement('div');
                    card.className = `card-preco ${p.valor === ord[0].valor ? 'mais-barato' : ''}`;
                    card.onclick = () => { document.getElementById('selectMercado').value = p.supermercado_id; document.getElementById('inputPreco').value = p.valor; };
                    card.innerHTML = `<span>${p.supermercados.nome}</span><span class="valor-loja">R$ ${p.valor.toFixed(2)}</span>`;
                    listaDiv.appendChild(card);
                });
            }
        }

        // --- LÓGICA DE CADASTRO DE NOVO PRODUTO ---
        function ativarModoNovoProduto(ean) {
            resetarEstados();
            ehProdutoNovo = true;
            eanAtual = ean;
            document.getElementById('areaNovoCadastro').style.display = 'block';
            document.getElementById('areaFormularioPreco').style.display = 'block';
            document.getElementById('novoNome').focus();
        }

        function previewFoto(input) {
            const file = input.files[0];
            if (file) {
                arquivoFotoParaUpload = file;
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.getElementById('previewFoto');
                    img.src = e.target.result;
                    img.style.display = 'block';
                }
                reader.readAsDataURL(file);
            }
        }

        async function salvarTudo() {
            const p = document.getElementById('inputPreco').value;
            const m = document.getElementById('selectMercado').value;
            const btn = document.getElementById('btnFinalizar');

            if (!p || !m) return alert("Preencha o preço e a loja!");

            btn.disabled = true;
            btn.innerHTML = "⏳ Gravando dados...";

            try {
                let nomeFinal = "";
                let fotoFinal = "";

                if (ehProdutoNovo) {
                    nomeFinal = document.getElementById('novoNome').value.trim();
                    if (!nomeFinal) throw new Error("O nome do produto novo é obrigatório!");

                   // --- TRECHO CORRIGIDO DENTRO DA FUNÇÃO salvarTudo ---

// 1. Upload da Foto (se houver)
if (arquivoFotoParaUpload) {
    btn.innerHTML = "📸 Fazendo upload da foto...";
    const nomeArquivo = `${eanAtual}_${Date.now()}.jpg`;
    
    // ALTERADO DE 'fotos_produtos' PARA 'fotos-produtos'
    const { error: errorUpload } = await supabaseClient.storage
        .from('fotos-produtos') 
        .upload(nomeArquivo, arquivoFotoParaUpload);

    if (errorUpload) throw new Error("Erro upload foto: " + errorUpload.message);

    // ALTERADO TAMBÉM AQUI PARA PEGAR A URL
    const { data: dataUrl } = supabaseClient.storage
        .from('fotos-produtos')
        .getPublicUrl(nomeArquivo);
        
    fotoFinal = dataUrl.publicUrl;
}

                    // 2. Cadastrar Produto na tabela 'produtos'
                    btn.innerHTML = "📝 Cadastrando produto...";
                    await supabaseClient.from('produtos').insert({ id: eanAtual, nome: nomeFinal, foto_url: fotoFinal });

                } else {
                    // Produto já existe (banco ou web), usa o upsert padrão
                    nomeFinal = document.getElementById('resNome').innerText;
                    fotoFinal = fotoUrlTemporaria;
                    await supabaseClient.from('produtos').upsert({ id: eanAtual, nome: nomeFinal, foto_url: fotoFinal });
                }

                // 3. Cadastrar Preço
                btn.innerHTML = "💰 Salvando preço...";
                const { error: errorPreco } = await supabaseClient.from('precos').insert([{ produto_id: eanAtual, valor: parseFloat(p), supermercado_id: parseInt(m), data_coleta: new Date().toISOString() }]);
                if (errorPreco) throw errorPreco;
                
                alert("✅ Salvo com sucesso!");
                ehProdutoNovo = false; // Reseta o modo para busca normal
                buscarHibrida();

            } catch (err) {
                alert("Erro: " + err.message);
                btn.disabled = false;
                btn.innerHTML = "💾 SALVAR NO BANCO";
            }
        }

        async function cadastrarLoja() {
            const n = prompt("Novo Supermercado:");
            if (n) { await supabaseClient.from('supermercados').insert([{ nome: n }]); carregarMercados(); }
        }
    </script>
</body>
</html>
