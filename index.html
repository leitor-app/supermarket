<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Scanner v10.5 - Estabilidade Total</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root { --primary: #10b981; --bg: #0f172a; --card: rgba(30, 41, 59, 0.9); }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; box-sizing: border-box; }
    
    .smart-card { width: 100%; max-width: 400px; background: var(--card); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 25px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5); backdrop-filter: blur(15px); position: relative; }
    .version-tag { position: absolute; top: 12px; right: 20px; font-size: 0.6em; color: rgba(255,255,255,0.3); font-weight: bold; }
    
    h1 { text-align: center; color: var(--primary); font-size: 1.8rem; margin: 0; font-weight: 700; }
    .subtitle { text-align: center; color: rgba(255, 255, 255, 0.5); font-size: 0.85em; margin-bottom: 20px; }
    
    label { font-size: 0.75em; color: #94a3b8; text-transform: uppercase; font-weight: 700; margin-top: 15px; display: block; }
    input, select { width: 100%; padding: 14px; margin-top: 6px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.1); background: #0f172a; color: white; box-sizing: border-box; font-size: 1em; }

    .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
    .btn { padding: 14px; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 14px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
    .btn-cam { background: var(--primary); }
    .btn-search { background: transparent; border: 2px solid #334155; }

    #autocompleteList { position: absolute; width: calc(100% - 50px); background: #1e293b; border-radius: 10px; max-height: 200px; overflow-y: auto; z-index: 100; display: none; border: 1px solid #334155; }
    .suggestion-item { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; display: flex; align-items: center; }

    #reader { width: 100%; border-radius: 15px; overflow: hidden; margin-top: 15px; display: none; border: 2px solid var(--primary); }

    /* Área de Resultado */
    #areaResultado { display: none; margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
    .card-preco { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid transparent; }
    .mais-barato { border-color: var(--primary); background: rgba(16, 185, 129, 0.1); }

    /* Estilo do OCR em espera */
    #areaOcr { display: none; margin-top: 15px; background: rgba(59, 130, 246, 0.1); border: 1px solid #3b82f6; border-radius: 15px; padding: 15px; }

    .action-group { margin-top: 25px; display: flex; flex-direction: column; gap: 10px; }
    .btn-action { background: rgba(255,255,255,0.03); border: 1px solid #334155; color: #cbd5e1; border-radius: 14px; padding: 14px; text-align: left; font-size: 0.9em; display: flex; align-items: center; cursor: pointer; }
    .btn-action i { width: 25px; color: var(--primary); }
  </style>
</head>
<body>

  <div class="smart-card">
    <div class="version-tag">V10.5</div>
    <h1>Smart Scanner</h1>
    <p class="subtitle">Produtos e Preços na sua Planilha</p>
    
    <label>PESQUISAR PRODUTO</label>
    <input type="text" id="barcodeInput" placeholder="Escaneie ou digite..." oninput="buscarSugestoes()" autocomplete="off">
    <div id="autocompleteList"></div>
    
    <div class="button-group">
      <button class="btn btn-cam" onclick="toggleScanner()"><i class="fas fa-camera"></i> Câmera</button>
      <button class="btn btn-search" onclick="buscarHibrida()">🔍 Buscar</button>
    </div>

    <div id="reader"></div>

    <div id="areaOcr">
      <h3 style="color:#3b82f6; font-size:0.9em; margin:0;">📋 Revisão do Cupom</h3>
      <p id="ocrStatus" style="font-size:0.7em; color:#94a3b8">Iniciando...</p>
      <div id="listaItensOcr" style="margin:10px 0; max-height:150px; overflow-y:auto;"></div>
      <button class="btn" style="background:var(--primary); width:100%;" onclick="salvarTudoOcr()">SALVAR TUDO</button>
    </div>

    <div id="areaResultado">
      <div style="display:flex; align-items:center; margin-bottom:15px;">
        <img id="resFoto" style="width:50px; height:50px; background:white; border-radius:8px; margin-right:12px; object-fit:contain;">
        <div><h3 id="resNome" style="margin:0; font-size:0.95em;"></h3><small id="resEan" style="color:#64748b"></small></div>
      </div>
      <div id="listaPrecos"></div>
      
      <div style="margin-top:15px; background:rgba(16,185,129,0.05); padding:10px; border-radius:12px; border:1px solid rgba(16,185,129,0.2);">
        <input type="number" id="inputPreco" step="0.01" placeholder="Novo Preço R$ 0.00">
        <select id="selectMercadoBusca" style="margin-top:8px;"></select>
        <button class="btn" style="background:var(--primary); width:100%; margin-top:10px;" onclick="salvarNovoPreco()">ATUALIZAR</button>
      </div>
    </div>

    <div class="action-group">
      <button class="btn btn-action" onclick="document.getElementById('fotoCupom').click()">
        <i class="fas fa-file-invoice-dollar"></i> Ler Comprovante com IA
      </button>
      <input type="file" id="fotoCupom" accept="image/*" capture="environment" style="display:none" onchange="iniciarOcr(this)">
      
      <button class="btn btn-action" onclick="cadastrarLoja()"><i class="fas fa-store"></i> Cadastrar Supermercado</button>
    </div>
  </div>

  <script>
    const URL_BANCO = 'https://vnpoanckjsjggqqtlpxk.supabase.co';
    const CHAVE_ANON = 'sb_publishable_wzxmqxBXAq2s9krb3Q-Eiw_4gHowgs7';
    const supabaseClient = supabase.createClient(URL_BANCO, CHAVE_ANON);

    let html5QrCode, eanAtual, timeoutBusca, itensOcr = [];

    window.onload = carregarMercados;

    async function carregarMercados() {
      const { data } = await supabaseClient.from('supermercados').select('id, nome').order('nome');
      if (data) {
        const selects = [document.getElementById('selectMercadoBusca')];
        selects.forEach(s => {
          s.innerHTML = '<option value="">Qual Supermercado?</option>';
          data.forEach(m => { s.innerHTML += `<option value="${m.id}">${m.nome}</option>`; });
        });
      }
    }

    // --- BUSCA HIBRIDA (RESTAURADA v10.1) ---
    async function buscarHibrida() {
      const t = document.getElementById('barcodeInput').value.trim();
      if(!t) return;
      document.getElementById('autocompleteList').style.display='none';
      
      const { data } = await supabaseClient.from('produtos').select(`id, nome, foto_url, precos(valor, data_coleta, supermercado_id, supermercados(nome))`).or(`id.eq.${t},nome.ilike.%${t}%`).maybeSingle();
      
      if(data) {
        eanAtual = data.id;
        document.getElementById('areaResultado').style.display = 'block';
        document.getElementById('resNome').innerText = data.nome;
        document.getElementById('resEan').innerText = "EAN: " + data.id;
        document.getElementById('resFoto').src = data.foto_url || "";
        const lista = document.getElementById('listaPrecos'); lista.innerHTML = "";
        if(data.precos && data.precos.length > 0) {
           const u = {}; data.precos.forEach(p => { if(!u[p.supermercado_id] || new Date(p.data_coleta) > new Date(u[p.supermercado_id].data_coleta)) u[p.supermercado_id] = p; });
           const ord = Object.values(u).sort((a,b) => a.valor - b.valor);
           ord.forEach(p => {
             lista.innerHTML += `<div class="card-preco ${p.valor === ord[0].valor ? 'mais-barato' : ''}">
                                   <span>${p.supermercados.nome}</span><b>R$ ${p.valor.toFixed(2)}</b>
                                 </div>`;
           });
        }
      }
    }

    async function buscarSugestoes() {
      const t = document.getElementById('barcodeInput').value.trim();
      const l = document.getElementById('autocompleteList');
      if(t.length < 2) { l.style.display='none'; return; }
      clearTimeout(timeoutBusca);
      timeoutBusca = setTimeout(async () => {
        const { data } = await supabaseClient.from('produtos').select('id, nome, foto_url').ilike('nome', `%${t}%`).limit(5);
        if(data && data.length > 0) {
          l.innerHTML = ""; l.style.display = 'block';
          data.forEach(p => {
            const item = document.createElement('div'); item.className='suggestion-item';
            item.innerHTML = `<img src="${p.foto_url||''}" style="width:25px;margin-right:10px;">${p.nome}`;
            item.onclick = () => { document.getElementById('barcodeInput').value = p.id; l.style.display='none'; buscarHibrida(); };
            l.appendChild(item);
          });
        } else { l.style.display='none'; }
      }, 300);
    }

    // --- SCANNER (RESTAURADO v10.1) ---
    function toggleScanner() {
      const r = document.getElementById('reader');
      if(r.style.display === 'block') { if(html5QrCode) html5QrCode.stop().then(()=> r.style.display='none'); }
      else { 
        r.style.display='block'; 
        html5QrCode = new Html5Qrcode("reader"); 
        html5QrCode.start({facingMode:"environment"}, {fps:10, qrbox:250}, (t)=>{ 
          document.getElementById('barcodeInput').value=t; 
          html5QrCode.stop().then(()=> {r.style.display='none'; buscarHibrida();}); 
        }); 
      }
    }

    // --- OCR SOB DEMANDA (v10.5) ---
    async function iniciarOcr(input) {
      const file = input.files[0]; if(!file) return;
      document.getElementById('areaOcr').style.display = 'block';
      const status = document.getElementById('ocrStatus');
      status.innerText = "⏳ Carregando IA...";
      
      // Carrega biblioteca dinamicamente para não pesar o app
      if (typeof Tesseract === 'undefined') {
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
        script.onload = () => processarImagemOcr(file);
        document.head.appendChild(script);
      } else { processarImagemOcr(file); }
    }

    async function processarImagemOcr(file) {
      const status = document.getElementById('ocrStatus');
      status.innerText = "🔍 Analisando cupom... Aguarde.";
      const { data: { text } } = await Tesseract.recognize(file, 'por');
      status.innerText = "✅ Concluído! Confira:";
      
      const container = document.getElementById('listaItensOcr');
      container.innerHTML = ""; itensOcr = [];
      const regexP = /(\d+[,\.]\d{2})/g;
      const regexE = /(\d{13})/g;

      text.split('\n').forEach((linha, i) => {
        const p = linha.match(regexP);
        const e = linha.match(regexE);
        if(p) {
          const item = { id: i, ean: e?e[0]:null, preco: parseFloat(p[0].replace(',','.')) };
          itensOcr.push(item);
          container.innerHTML += `<div id="it-${i}" class="card-preco">
                                    <span>${linha.substring(0,20)}</span>
                                    <b>R$ ${item.preco.toFixed(2)}</b>
                                    <button onclick="this.parentElement.remove()" style="background:none; border:none; color:red;">✕</button>
                                  </div>`;
        }
      });
    }

    async function salvarNovoPreco() {
      const p = document.getElementById('inputPreco').value;
      const m = document.getElementById('selectMercadoBusca').value;
      if(!p || !m) return alert("Selecione mercado e preço!");
      const { error } = await supabaseClient.from('precos').insert([{produto_id:eanAtual, valor:parseFloat(p), supermercado_id:parseInt(m), data_coleta:new Date().toISOString()}]);
      if(!error) { alert("Salvo!"); buscarHibrida(); }
    }

    async function cadastrarLoja() { const n = prompt("Nome:"); if(n) { await supabaseClient.from('supermercados').insert([{nome:n}]); carregarMercados(); } }
  </script>
</body>
</html>
