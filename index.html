<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supermarket Scanner v6</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; padding: 20px; margin: 0; }
    .container { max-width: 450px; margin: auto; }
    h1 { text-align: center; color: #10b981; font-size: 1.5rem; }
    label { font-size: 0.85em; color: #94a3b8; margin-top: 15px; display: block; }
    input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.2); color: white; box-sizing: border-box; }
    
    .btn { width: 100%; padding: 15px; background: #10b981; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 12px; margin-bottom: 10px; transition: 0.2s; }
    .btn:active { transform: scale(0.98); opacity: 0.8; }
    .btn:disabled { background: #334155; cursor: not-allowed; }
    .btn-secondary { background: #3b82f6; }
    .btn-outline { background: transparent; border: 1px solid #3b82f6; color: #3b82f6; padding: 8px; font-size: 0.8em; margin-top: 5px; width: auto; display: inline-block; cursor: pointer; border-radius: 6px; }
    
    .card { margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
    
    .photo-frame { width: 100%; height: 200px; background: rgba(0,0,0,0.3); border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; margin: 10px 0; border: 2px dashed rgba(255,255,255,0.1); }
    .photo-frame img { max-width: 100%; max-height: 100%; object-fit: contain; }
    
    .status { font-size: 0.85em; color: #fbbf24; text-align: center; margin: 10px 0; min-height: 1.2em; }
    .divider { margin: 25px 0; border-top: 1px solid rgba(255,255,255,0.1); }
    
    #resultadoBanco { display: none; padding: 15px; background: rgba(16,185,129,0.15); border-radius: 12px; margin-top:15px; border: 1px solid #10b981; }
  </style>
</head>
<body>

  <div class="container">
    <h1>Supermarket Scanner</h1>
    
    <div class="card">
      <label>Código de Barras (EAN)</label>
      <input type="text" id="mainBarcode" placeholder="Digite ou escaneie o código" autofocus>
      <button class="btn" id="btnBuscar" onclick="buscarPrincipal()">🔍 Buscar Produto</button>
      
      <div id="resultadoBanco">
        <img id="resFoto" style="width: 80px; height: 80px; float: right; border-radius: 8px; background: white; padding: 3px; object-fit: contain;">
        <h3 id="resNome" style="margin: 0; font-size: 1.1em;"></h3>
        <p id="resPreco" style="margin: 5px 0; color: #10b981; font-weight: bold; font-size: 1.3em;"></p>
        <div style="clear: both;"></div>
        <button class="btn-outline" onclick="abrirCadastroParaAtualizar()">Verificou preço novo? Clique aqui</button>
      </div>
    </div>

    <div id="secaoCadastro" style="display: none;">
      <div class="divider"></div>
      <div class="card">
        <h3 id="tituloCadastro">Novo Cadastro</h3>
        <p class="status" id="statusInfo"></p>
        
        <label>Nome do Produto</label>
        <input type="text" id="newName" placeholder="Ex: Feijão Carioca 1kg">
        
        <label>Foto do Produto (Toque na moldura para tirar foto)</label>
        <div class="photo-frame" onclick="document.getElementById('fotoInput').click()">
          <img id="preview" src="data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%23475569' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Crect x='3' y='4' width='18' height='18' rx='2' ry='2'%3E%3C/rect%3E%3Cline x1='3' y1='10' x2='21' y2='10'%3E%3C/line%3E%3C/svg%3E">
        </div>
        <input type="file" id="fotoInput" accept="image/*" capture="environment" style="display: none;">

        <label>Preço Atual (R$)</label>
        <input type="number" id="newPrice" step="0.01" placeholder="0.00">

        <label>Supermercado (Exato)</label>
        <input type="text" id="supermercadoInput" placeholder="Ex: Carrefour">
        <div class="btn-outline" style="border-color: #94a3b8; color: #94a3b8;" onclick="cadastrarLojaRapido()">+ Cadastrar Nova Loja</div>
        
        <button class="btn btn-secondary" id="btnSalvar" onclick="salvarTudo()" style="margin-top: 25px;">💾 Salvar no Meu Banco</button>
      </div>
    </div>
  </div>

  <script>
    // CONFIGURAÇÕES SUPABASE
    const URL_BANCO = 'https://vnpoanckjsjggqqtlpxk.supabase.co';
    const CHAVE_ANON = 'sb_publishable_wzxmqxBXAq2s9krb3Q-Eiw_4gHowgs7';
    const supabaseClient = supabase.createClient(URL_BANCO, CHAVE_ANON);

    let urlFotoGlobal = ""; 
    const svgPlaceholder = "data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%23475569' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Crect x='3' y='4' width='18' height='18' rx='2' ry='2'%3E%3C/rect%3E%3Cline x1='3' y1='10' x2='21' y2='10'%3E%3C/line%3E%3C/svg%3E";

    // 1. BUSCA PRINCIPAL
    async function buscarPrincipal() {
      const codigo = document.getElementById('mainBarcode').value.trim();
      if (!codigo) return;

      // Reset UI
      document.getElementById('resultadoBanco').style.display = 'none';
      document.getElementById('secaoCadastro').style.display = 'none';
      document.getElementById('statusInfo').innerText = "";
      urlFotoGlobal = "";

      try {
        const { data, error } = await supabaseClient
          .from('produtos')
          .select(`nome, foto_url, precos (valor)`)
          .eq('id', codigo)
          .maybeSingle();

        if (data) {
          document.getElementById('resultadoBanco').style.display = 'block';
          document.getElementById('resNome').innerText = data.nome;
          document.getElementById('resFoto').src = data.foto_url || svgPlaceholder;
          const precoRecente = data.precos?.[0]?.valor || 0;
          document.getElementById('resPreco').innerText = `R$ ${precoRecente.toFixed(2)}`;
        } else {
          buscarNaWeb(codigo);
        }
      } catch (err) {
        console.error("Erro busca:", err);
      }
    }

    // 2. BUSCA NA WEB (OPEN FOOD FACTS)
    async function buscarNaWeb(codigo) {
      const secao = document.getElementById('secaoCadastro');
      const status = document.getElementById('statusInfo');
      const inputNome = document.getElementById('newName');
      const preview = document.getElementById('preview');

      secao.style.display = 'block';
      status.innerText = "🔍 Buscando sugestão na Web...";
      preview.src = svgPlaceholder;

      try {
        const response = await fetch(`https://world.openfoodfacts.org/api/v0/product/${codigo}.json`);
        const data = await response.json();

        if (data.status === 1) {
          inputNome.value = data.product.product_name || data.product.product_name_pt || "";
          urlFotoGlobal = data.product.image_url || "";
          preview.src = urlFotoGlobal || svgPlaceholder;
          status.innerText = "✅ Sugestão encontrada! Complete o preço.";
        } else {
          status.innerText = "⚠️ Não encontrado na web. Preencha manualmente.";
        }
      } catch (e) {
        status.innerText = "⚠️ Erro ao conectar com a web.";
      }
    }

    // 3. AUXILIARES UI
    function abrirCadastroParaAtualizar() {
      document.getElementById('secaoCadastro').style.display = 'block';
      document.getElementById('tituloCadastro').innerText = "Atualizar Preço";
      document.getElementById('newName').value = document.getElementById('resNome').innerText;
      document.getElementById('preview').src = document.getElementById('resFoto').src;
      urlFotoGlobal = document.getElementById('resFoto').src;
      document.getElementById('newPrice').focus();
    }

    async function cadastrarLojaRapido() {
      const nomeLoja = prompt("Nome do novo Supermercado:");
      if (!nomeLoja) return;
      const { error } = await supabaseClient.from('supermercados').insert([{ nome: nomeLoja }]);
      if (error) alert("Erro: " + error.message);
      else alert("Supermercado '" + nomeLoja + "' cadastrado com sucesso!");
    }

    // Monitor de Foto Manual
    document.getElementById('fotoInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (ev) => {
          document.getElementById('preview').src = ev.target.result;
          urlFotoGlobal = "LOCAL_IMAGE"; 
        };
        reader.readAsDataURL(file);
      }
    });

    // 4. SALVAR TUDO
    async function salvarTudo() {
      const id = document.getElementById('mainBarcode').value.trim();
      const nome = document.getElementById('newName').value.trim();
      const preco = document.getElementById('newPrice').value;
      const lojaNome = document.getElementById('supermercadoInput').value.trim();
      const btn = document.getElementById('btnSalvar');

      if (!id || !nome || !preco || !lojaNome) return alert("Por favor, preencha todos os campos obrigatórios!");

      btn.innerText = "⏳ Gravando dados...";
      btn.disabled = true;

      try {
        // A. Validar Supermercado
        const { data: loja, error: errLoja } = await supabaseClient
          .from('supermercados')
          .select('id')
          .eq('nome', lojaNome)
          .maybeSingle();

        if (!loja) {
          btn.disabled = false;
          btn.innerText = "💾 Salvar no Meu Banco";
          return alert("Supermercado não encontrado! Cadastre a loja primeiro no botão acima.");
        }

        let urlFinalParaBanco = urlFotoGlobal;

        // B. Upload de Foto (Se for nova ou da Web)
        if (urlFotoGlobal && urlFotoGlobal !== svgPlaceholder) {
          let blobParaUpload;
          
          if (urlFotoGlobal === "LOCAL_IMAGE") {
             blobParaUpload = document.getElementById('fotoInput').files[0];
          } else if (urlFotoGlobal.startsWith('http') && urlFotoGlobal.includes('openfoodfacts')) {
             // Clonagem da Web
             try {
               const resImg = await fetch(urlFotoGlobal);
               blobParaUpload = await resImg.blob();
             } catch(e) { console.log("Erro CORS ao clonar imagem da web."); }
          }

          if (blobParaUpload) {
            const fileName = `${id}_${Date.now()}.jpg`;
            const { error: upErr } = await supabaseClient.storage.from('fotos-produtos').upload(fileName, blobParaUpload);
            if (!upErr) {
               const { data: urlData } = supabaseClient.storage.from('fotos-produtos').getPublicUrl(fileName);
               urlFinalParaBanco = urlData.publicUrl;
            }
          }
        }

        // C. Salvar Produto (Upsert)
        const { error: errorProd } = await supabaseClient
          .from('produtos')
          .upsert({ id: id, nome: nome, foto_url: urlFinalParaBanco });
        if (errorProd) throw errorProd;

        // D. Salvar Preço
        const { error: errorPreco } = await supabaseClient
          .from('precos')
          .insert({
            produto_id: id,
            valor: parseFloat(preco),
            supermercado_id: loja.id,
            data_coleta: new Date().toISOString()
          });
        if (errorPreco) throw errorPreco;

        alert("✅ Produto e Preço salvos com sucesso!");
        location.reload();

      } catch (err) {
        alert("Erro ao salvar: " + err.message);
        btn.disabled = false;
        btn.innerText = "💾 Salvar no Meu Banco";
      }
    }
  </script>
</body>
</html>
