<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Teste de Deploy</title>
    <style>
        body { 
            background: #000; 
            color: #0f0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: monospace;
            flex-direction: column;
        }
        h1 { border-right: 2px solid; width: fit-content; overflow: hidden; white-space: nowrap; animation: typing 2s steps(22), blink .5s infinite step-end alternate; }
        @keyframes typing { from { width: 0 } }
        @keyframes blink { 50% { border-color: transparent } }
    </style>
</head>
<body>

    <h1>Supermarket Scanner: Online!</h1>
    <p>Hora do teste: <span id="hora"></span></p>
    <button onclick="alert('O JavaScript está funcionando!')" style="padding: 10px 20px; cursor: pointer;">Testar Botão</button>

    <script>
        // Mostra a hora atual para garantir que não é cache antigo
        document.getElementById('hora').innerText = new Date().toLocaleTimeString();
    </script>
</body>
</html>
