<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Scanner v8 - Coleta de Preços</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
    .smart-card { width: 100%; max-width: 400px; background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 25px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5); backdrop-filter: blur(15px); }
    
    h1 { text-align: center; color: #10b981; font-size: 1.8rem; margin: 0; font-weight: 700; }
    .subtitle { text-align: center; color: rgba(255, 255, 255, 0.5); font-size: 0.85em; margin-bottom: 20px; }
    
    label { font-size: 0.75em; color: #94a3b8; text-transform: uppercase; font-weight: 700; margin-top: 20px; display: block; letter-spacing: 0.5px; }
    input, select { width: 100%; padding: 14px; margin-top: 6px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.1); background: #0f172a; color: white; box-sizing: border-box; font-size: 1em; }
    
    /* Grid de Botões Superiores */
    .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
    .btn { padding: 14px; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 14px; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
    .btn-cam { background: #10b981; }
    .btn-search { background: #334155; }
    .btn:active { transform: scale(0.95); }

    /* Área do Produto Encontrado */
    #areaResultado { display: none; margin-top: 25px; animation: fadeIn 0.4s ease; }
    .product-info { display: flex; align-items: center; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); }
    .product-info img { width: 70px; height: 70px; object-fit: contain; background: white; border-radius: 10px; padding: 5px; margin-right: 15px; }
    .product-info h3 { margin: 0; font-size: 1em; color: #f8fafc; }

    /* Formulário de Preço */
    .price-form { margin-top: 20px; padding: 15px; background: rgba(16, 185, 129, 0.05); border-radius: 18px; border: 1px solid rgba(16, 185, 129, 0.2); }
    .btn-save { width: 100%; background: #10b981; margin-top: 15px; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); }

    .action-group { margin-top: 30px; display: flex; flex-direction: column; gap: 10px; }
    .btn-action { background: rgba(255, 255, 255, 0.03); border: 1px solid #334155; color: #94a3b8; border-radius: 14px; padding: 12px; text-align: left; font-size: 0.9em; display: flex; align-items: center; }
    .btn-action i { width: 25px; color: #10b981; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <div class="smart-card">
    <h1>Smart Scanner</h1>
    <p class="subtitle">Produtos e Preços na sua Planilha</p>
    
    <label>Pesquisar Código ou Nome</label>
    <input type="text" id="barcodeInput" placeholder="Ex: Yakult ou 789...">
    
    <div class="button-group">
      <button class="btn btn-cam" onclick="abrirCamera()"><i class="fas fa-camera"></i> Câmera</button>
      <button class="btn btn-search" id="btnBuscar" onclick="buscarNoBanco()"><i class="fas fa-search"></i> Buscar</button>
    </div>

    <div id="areaResultado">
      <div class="product-info">
        <img id="resFoto" src="">
        <div>
          <h3 id="resNome">Nome do Produto</h3>
          <small id="resEan" style="color:#64748b"></small>
        </div>
      </div>

      <div class="price-form">
        <label>Qual o Preço agora?</label>
        <input type="number" id="inputPreco" step="0.01" placeholder="R$ 0,00">
        
        <label>Onde você está?</label>
        <select id="selectMercado">
          <option value="">Selecione um Supermercado...</option>
          </select>
        
        <button class="btn btn-save" onclick="salvarNovoPreco()">
          <i class="fas fa-check-circle"></i> &nbsp; SALVAR PREÇO
        </button>
      </div>
    </div>

    <div class="action-group">
      <button class="btn btn-action" onclick="cadastrarLoja()"><i class="fas fa-store"></i> Cadastrar Supermercado</button>
      <button class="btn btn-action"><i class="fas fa-clipboard-list"></i> Minha Lista de Compras</button>
    </div>
  </div>

  <script>
    const URL_BANCO = 'https://vnpoanckjsjggqqtlpxk.supabase.co';
    const CHAVE_ANON = 'sb_publishable_wzxmqxBXAq2s9krb3Q-Eiw_4gHowgs7';
    const supabaseClient = supabase.createClient(URL_BANCO, CHAVE_ANON);

    let eanAtual = "";

    // Ao carregar a página, já puxa os mercados para o Select
    window.onload = carregarMercados;

    async function carregarMercados() {
      const select = document.getElementById('selectMercado');
      const { data, error } = await supabaseClient.from('supermercados').select('id, nome').order('nome');
      
      if (data) {
        select.innerHTML = '<option value="">Selecione um Supermercado...</option>';
        data.forEach(m => {
          let opt = document.createElement('option');
          opt.value = m.id;
          opt.innerText = m.nome;
          select.appendChild(opt);
        });
      }
    }

    async function buscarNoBanco() {
      const termo = document.getElementById('barcodeInput').value.trim();
      if (!termo) return;

      const { data, error } = await supabaseClient
        .from('produtos')
        .select('*')
        .or(`id.eq.${termo},nome.ilike.%${termo}%`)
        .maybeSingle();

      if (data) {
        exibirCardPreco(data);
      } else {
        alert("Produto não encontrado. Deseja cadastrar?");
        // Aqui poderíamos chamar a busca na Web, mas vamos focar no seu pedido da tela 1
      }
    }

    function exibirCardPreco(produto) {
      eanAtual = produto.id;
      document.getElementById('areaResultado').style.display = 'block';
      document.getElementById('resNome').innerText = produto.nome;
      document.getElementById('resEan').innerText = "EAN: " + produto.id;
      document.getElementById('resFoto').src = produto.foto_url || "https://via.placeholder.com/70";
      document.getElementById('inputPreco').value = "";
      document.getElementById('inputPreco').focus();
    }

    async function salvarNovoPreco() {
      const preco = document.getElementById('inputPreco').value;
      const mercadoId = document.getElementById('selectMercado').value;

      if (!preco || !mercadoId) {
        return alert("⚠️ ERRO: Informe o preço e selecione o supermercado!");
      }

      const { error } = await supabaseClient.from('precos').insert({
        produto_id: eanAtual,
        valor: parseFloat(preco),
        supermercado_id: mercadoId,
        data_coleta: new Date().toISOString()
      });

      if (error) {
        alert("Erro ao salvar: " + error.message);
      } else {
        alert("✅ Preço registrado com sucesso!");
        document.getElementById('areaResultado').style.display = 'none';
        document.getElementById('barcodeInput').value = "";
      }
    }

    async function cadastrarLoja() {
      const nome = prompt("Nome do novo Supermercado:");
      if (!nome) return;
      await supabaseClient.from('supermercados').insert([{ nome: nome }]);
      carregarMercados(); // Atualiza a lista na hora
      alert("Loja cadastrada!");
    }

    function abrirCamera() { alert("Abrindo câmera para EAN..."); }
  </script>
</body>
</html>
