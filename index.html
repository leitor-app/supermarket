<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Scanner v10.2 - IA Gemini & Supabase</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root { --primary: #10b981; --bg: #0f172a; --card: rgba(30, 41, 59, 0.8); --warning: #fbbf24; --blue: #3b82f6; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        
        .smart-card { width: 100%; max-width: 420px; background: var(--card); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 20px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5); backdrop-filter: blur(15px); position: relative; }
        .version-tag { position: absolute; top: 10px; right: 20px; font-size: 0.6em; color: rgba(255,255,255,0.3); font-weight: bold; }
        
        h1 { text-align: center; color: var(--primary); font-size: 1.6rem; margin: 0; font-weight: 700; }
        .subtitle { text-align: center; color: rgba(255, 255, 255, 0.5); font-size: 0.8em; margin-bottom: 15px; }
        
        label { font-size: 0.7em; color: #94a3b8; text-transform: uppercase; font-weight: 700; margin-top: 15px; display: block; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.1); background: #0f172a; color: white; box-sizing: border-box; font-size: 1em; }

        .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { padding: 12px; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 12px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-cam { background: var(--primary); }
        .btn-search { background: transparent; border: 2px solid #334155; }
        
        /* Área de Revisão IA */
        #areaOcr { display: none; margin-top: 20px; background: rgba(59, 130, 246, 0.1); border: 1px solid var(--blue); border-radius: 18px; padding: 15px; }
        .item-ocr { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 0.85em; }
        .btn-del { color: #ef4444; background: none; border: none; font-size: 1.1rem; cursor: pointer; }

        #reader { width: 100%; border-radius: 12px; overflow: hidden; margin-top: 15px; display: none; border: 2px solid var(--primary); }
        #areaResultado { display: none; margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
        .product-header { display: flex; align-items: center; margin-bottom: 15px; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 12px; }
        .product-header img { width: 50px; height: 50px; object-fit: contain; background: white; border-radius: 8px; margin-right: 12px; }
        
        .scroll-precos { max-height: 180px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        .card-preco { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; }
        
        .price-form { background: rgba(16, 185, 129, 0.05); padding: 15px; border-radius: 15px; border: 1px solid rgba(16, 185, 129, 0.2); margin-top: 10px; }
        .action-group { margin-top: 20px; display: flex; flex-direction: column; gap: 8px; }
        .btn-action { background: rgba(255, 255, 255, 0.02); border: 1px solid #334155; color: #cbd5e1; border-radius: 12px; padding: 10px 15px; text-align: left; font-size: 0.85em; display: flex; align-items: center; cursor: pointer; }
        .btn-action i { width: 25px; color: var(--primary); }
    </style>
</head>
<body>

    <div class="smart-card">
        <div class="version-tag">VERSÃO 10.2</div>
        <h1>Smart Scanner</h1>
        <p class="subtitle">IA Gemini + Supabase</p>
        
        <label>Pesquisar Produto</label>
        <input type="text" id="barcodeInput" placeholder="Escaneie ou digite..." oninput="buscarSugestoes()" autocomplete="off">
        <div id="autocompleteList" class="autocomplete-list"></div>
        
        <div class="button-group">
            <button class="btn btn-cam" onclick="toggleScanner()"><i class="fas fa-camera"></i> Câmera</button>
            <button class="btn btn-search" onclick="buscarHibrida()">🔍 Buscar</button>
        </div>

        <div id="reader"></div>

        <div id="areaOcr">
            <h3 style="color:var(--blue); font-size:0.9em; margin:0;">📋 Revisão do Cupom (IA)</h3>
            <p id="ocrStatus" style="font-size:0.7em; color:#94a3b8">Aguardando processamento...</p>
            
            <label>Confirmar Supermercado</label>
            <select id="selectMercadoOcr"></select>

            <div id="listaItensOcr" style="margin:15px 0; max-height:200px; overflow-y:auto;"></div>
            
            <button class="btn" style="background:var(--primary); width:100%;" onclick="salvarTudoOcr()">✅ SALVAR TUDO</button>
            <button class="btn" style="background:#334155; width:100%; margin-top:5px;" onclick="fecharOcr()">CANCELAR</button>
        </div>

        <div id="areaResultado">
            <div class="product-header">
                <img id="resFoto" src="">
                <div><h3 id="resNome" style="margin:0; font-size:0.9em;"></h3><small id="resEan" style="color:#64748b"></small></div>
            </div>
            <div id="listaPrecos" class="scroll-precos"></div>
        </div>

        <div class="action-group">
            <button class="btn btn-action" onclick="document.getElementById('fotoCupom').click()">
                <i class="fas fa-file-invoice-dollar" style="color:var(--blue)"></i> Ler Comprovante com IA
            </button>
            <input type="file" id="fotoCupom" accept="image/*" capture="environment" style="display:none" onchange="processarCupomIA(this)">
            <button class="btn btn-action" onclick="cadastrarLoja()"><i class="fas fa-store"></i> Cadastrar Supermercado</button>
        </div>
    </div>

    <script>
        const URL_BANCO = 'https://vnpoanckjsjggqqtlpxk.supabase.co';
        const CHAVE_ANON = 'sb_publishable_wzxmqxBXAq2s9krb3Q-Eiw_4gHowgs7';
        const GEMINI_KEY = "AIzaSyDOFBZuqlBWF5DKIIbd_i7t5raLfLE05RY"; // Sua chave do código antigo 
        const supabaseClient = supabase.createClient(URL_BANCO, CHAVE_ANON);

        let itensOcrGlobal = [];

        window.onload = carregarMercados;

        async function carregarMercados() {
            const { data } = await supabaseClient.from('supermercados').select('id, nome').order('nome');
            const selects = [document.getElementById('selectMercadoOcr')]; // Pode adicionar o select da busca aqui também
            if (data) {
                selects.forEach(s => {
                    if(!s) return;
                    s.innerHTML = '<option value="">Selecione o Supermercado...</option>';
                    data.forEach(m => { s.innerHTML += `<option value="${m.id}">${m.nome}</option>`; });
                });
            }
        }

        // --- LÓGICA IA GEMINI (ADAPTADA DO SEU CÓDIGO) ---
        async function processarCupomIA(input) {
            const file = input.files[0]; if (!file) return;
            document.getElementById('areaOcr').style.display = 'block';
            const status = document.getElementById('ocrStatus');
            status.innerText = "⏳ IA analisando cupom... (10-15s)";

            // 1. Converte e comprime para a IA não travar
            const base64 = await converterParaBase64(file);

            // 2. Prompt idêntico ao seu código antigo [cite: 65, 66]
            const prompt = "Extraia o nome do supermercado e os itens. OBRIGATÓRIO: Preço UNITÁRIO e CÓDIGO DE BARRAS numérico se houver. Retorne APENAS JSON: {\"supermercado\": \"Nome\", \"itens\": [{\"nome\": \"Prod\", \"preco\": 5.99, \"ean\": \"789...\"}]}";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
                    method: 'POST',
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: "image/jpeg", data: base64 } }] }] })
                });

                const resJson = await response.json();
                const textoLimpo = resJson.candidates[0].content.parts[0].text.replace(/```json/g, "").replace(/```/g, "").trim();
                const dados = JSON.parse(textoLimpo);

                status.innerText = "✅ Itens detectados!";
                renderizarRevisaoIA(dados);
            } catch (e) { status.innerText = "❌ Erro na IA: " + e.message; }
        }

        function renderizarRevisaoIA(dados) {
            const lista = document.getElementById('listaItensOcr');
            lista.innerHTML = "";
            itensOcrGlobal = dados.itens;

            itensOcrGlobal.forEach((it, i) => {
                const div = document.createElement('div');
                div.className = 'item-ocr';
                div.id = `item-ia-${i}`;
                div.innerHTML = `<div><b>R$ ${it.preco.toFixed(2)}</b><br><small>${it.nome}</small></div>
                                 <button class="btn-del" onclick="removerItemIA(${i})">✕</button>`;
                lista.appendChild(div);
            });
        }

        function removerItemIA(i) {
            document.getElementById(`item-ia-${i}`).remove();
            itensOcrGlobal[i] = null; // Marca para não salvar
        }

        async function salvarTudoOcr() {
            const mercadoId = document.getElementById('selectMercadoOcr').value;
            if (!mercadoId) return alert("Selecione o Supermercado!");

            const btn = event.target;
            btn.disabled = true; btn.innerText = "⏳ Salvando lote...";

            for (const item of itensOcrGlobal) {
                if (!item) continue;
                // Upsert do produto e insert do preço (Lógica Supabase)
                if (item.ean) {
                    await supabaseClient.from('produtos').upsert({ id: item.ean, nome: item.nome });
                }
                await supabaseClient.from('precos').insert([{
                    produto_id: item.ean || null,
                    valor: item.preco,
                    supermercado_id: parseInt(mercadoId),
                    data_coleta: new Date().toISOString()
                }]);
            }
            alert("✅ Todos os itens foram salvos!");
            fecharOcr();
        }

        function fecharOcr() { document.getElementById('areaOcr').style.display='none'; }

        // Auxiliar: Compressão para Base64
        function converterParaBase64(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX = 1000;
                        let w = img.width, h = img.height;
                        if (w > h && w > MAX) { h *= (MAX/w); w = MAX; }
                        else if (h > MAX) { w *= (MAX/h); h = MAX; }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        resolve(canvas.toDataURL("image/jpeg", 0.7).split(",")[1]);
                    };
                };
                reader.readAsDataURL(file);
            });
        }

        // --- RESTANTE DAS FUNÇÕES (Scanner, Busca, etc. mantidos da v10.1.5) ---
        function toggleScanner() { /* ... */ }
        async function buscarHibrida() { /* ... */ }
        async function cadastrarLoja() { /* ... */ }
    </script>
</body>
</html>
