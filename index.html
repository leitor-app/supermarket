<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supermarket Scanner v3</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; padding: 20px; }
    .container { max-width: 450px; margin: auto; }
    input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.2); color: white; box-sizing: border-box; }
    .btn { width: 100%; padding: 15px; background: #10b981; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 12px; margin-bottom: 10px; }
    .btn-secondary { background: #3b82f6; }
    .card { margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); }
    
    /* Moldura da Foto */
    .photo-frame { 
      width: 100%; height: 200px; background: rgba(0,0,0,0.3); border-radius: 12px; 
      display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; margin: 10px 0; border: 2px dashed rgba(255,255,255,0.1);
    }
    .photo-frame img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .status { font-size: 0.8em; color: #94a3b8; text-align: center; margin-bottom: 10px; }
  </style>
</head>
<body>

  <div class="container">
    <h1>Supermarket Scanner</h1>
    
    <div class="card">
      <label>Consultar Banco Local</label>
      <input type="text" id="barcodeSearch" placeholder="Código de barras">
      <button class="btn" onclick="buscarProdutoLocal()">Buscar no Meu Banco</button>
      <div id="resultado" style="display: none; padding: 10px; background: rgba(16,185,129,0.1); border-radius: 8px; margin-top:10px;">
        <h3 id="resNome" style="margin:0;"></h3>
        <p id="resPreco" style="color:#10b981; font-weight:bold;"></p>
      </div>
    </div>

    <div class="card">
      <h3>Cadastrar Produto</h3>
      
      <input type="text" id="newBarcode" placeholder="Código de Barras" onblur="buscarNaWeb()">
      <input type="text" id="newName" placeholder="Nome do Produto">
      
      <p class="status" id="statusInfo">Toque no ícone para trocar a foto</p>
      
      <div class="photo-frame" onclick="document.getElementById('fotoInput').click()">
        <img id="preview" src="https://via.placeholder.com/200?text=Sem+Foto">
      </div>
      
      <input type="file" id="fotoInput" accept="image/*" capture="environment" style="display: none;">
      
      <button class="btn btn-secondary" id="btnSalvar" onclick="salvarProduto()">Salvar Produto</button>
    </div>
  </div>

  <script>
    const URL_BANCO = 'https://vnpoanckjsjggqqtlpxk.supabase.co';
    const CHAVE_ANON = 'sb_publishable_wzxmqxBXAq2s9krb3Q-Eiw_4gHowgs7';
    const supabaseClient = supabase.createClient(URL_BANCO, CHAVE_ANON);

    let urlFotoFinal = ""; 

    // ==========================================
    // BUSCA NA WEB (OPEN FOOD FACTS)
    // ==========================================
    async function buscarNaWeb() {
      const codigo = document.getElementById('newBarcode').value.trim();
      if (codigo.length < 8) return;

      const status = document.getElementById('statusInfo');
      const preview = document.getElementById('preview');
      const inputNome = document.getElementById('newName');

      status.innerText = "🔍 Buscando na Web...";

      try {
        const response = await fetch(`https://world.openfoodfacts.org/api/v0/product/${codigo}.json`);
        const data = await response.json();

        if (data.status === 1 && data.product) {
          // Se achou o nome, já preenche pra você
          if (!inputNome.value) inputNome.value = data.product.product_name || "";
          
          // Se achou a foto, carrega no preview
          if (data.product.image_url) {
            urlFotoFinal = data.product.image_url;
            preview.src = urlFotoFinal;
            status.innerText = "✅ Foto encontrada na Web!";
            status.style.color = "#10b981";
          } else {
            status.innerText = "❌ Produto achado, mas sem foto.";
          }
        } else {
          status.innerText = "❓ Não encontrado na Web. Tire uma foto manual.";
        }
      } catch (e) {
        status.innerText = "⚠️ Erro ao buscar na web.";
      }
    }

    // ==========================================
    // LÓGICA DE FOTO MANUAL (COMPRESSÃO)
    // ==========================================
    document.getElementById('fotoInput').addEventListener('change', async function(e) {
      const arquivo = e.target.files[0];
      if (!arquivo) return;

      const status = document.getElementById('statusInfo');
      const preview = document.getElementById('preview');
      status.innerText = "⏳ Otimizando foto...";

      const reader = new FileReader();
      reader.onload = (event) => {
        const img = new Image();
        img.src = event.target.result;
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const MAX = 800;
          let w = img.width, h = img.height;
          if (w > h && w > MAX) { h *= MAX/w; w = MAX; }
          else if (h > MAX) { w *= MAX/h; h = MAX; }
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);

          canvas.toBlob(async (blob) => {
            const nomeArquivo = `manual_${Date.now()}.jpg`;
            status.innerText = "⏳ Enviando para o seu Storage...";

            const { data, error } = await supabaseClient.storage
              .from('fotos-produtos')
              .upload(nomeArquivo, blob);

            if (error) return alert("Erro no upload: " + error.message);

            const { data: urlData } = supabaseClient.storage
              .from('fotos-produtos')
              .getPublicUrl(nomeArquivo);

            urlFotoFinal = urlData.publicUrl;
            preview.src = urlFotoFinal;
            status.innerText = `✅ Foto manual salva! (${(blob.size/1024).toFixed(1)} KB)`;
            status.style.color = "#8b5cf6";
          }, 'image/jpeg', 0.7);
        };
      };
      reader.readAsDataURL(arquivo);
    });

    // ==========================================
    // SALVAR NO SUPABASE
    // ==========================================
    async function salvarProduto() {
      const id = document.getElementById('newBarcode').value.trim();
      const nome = document.getElementById('newName').value.trim();

      if (!id || !nome || !urlFotoFinal) return alert("Faltam dados ou foto!");

      const { error } = await supabaseClient
        .from('produtos')
        .insert([{ id, nome, foto_url: urlFotoFinal }]);

      if (error) {
        alert("Erro: " + error.message);
      } else {
        alert("Produto salvo com sucesso!");
        location.reload(); // Recarrega para limpar tudo
      }
    }

    async function buscarProdutoLocal() {
      const codigo = document.getElementById('barcodeSearch').value.trim();
      const { data, error } = await supabaseClient
        .from('produtos')
        .select(`nome, precos(valor)`)
        .eq('id', codigo).single();

      if (data) {
        document.getElementById('resultado').style.display = 'block';
        document.getElementById('resNome').innerText = data.nome;
        document.getElementById('resPreco').innerText = data.precos[0] ? `R$ ${data.precos[0].valor}` : "Sem preço";
      } else {
        alert("Não encontrado no seu banco.");
      }
    }
  </script>
</body>
</html>
