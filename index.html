<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Scanner v10.4 - Estável</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root { --primary: #10b981; --bg: #0f172a; --card: rgba(30, 41, 59, 0.85); --blue: #3b82f6; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; box-sizing: border-box; }
    
    /* Layout Fiel à Imagem */
    .smart-card { width: 100%; max-width: 400px; background: var(--card); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 25px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5); backdrop-filter: blur(15px); position: relative; }
    .version-tag { position: absolute; top: 12px; right: 20px; font-size: 0.6em; color: rgba(255,255,255,0.3); font-weight: bold; }
    
    h1 { text-align: center; color: var(--primary); font-size: 1.8rem; margin: 0; font-weight: 700; }
    .subtitle { text-align: center; color: rgba(255, 255, 255, 0.5); font-size: 0.85em; margin-bottom: 25px; }
    
    label { font-size: 0.75em; color: #94a3b8; text-transform: uppercase; font-weight: 700; margin-top: 20px; display: block; }
    input, select { width: 100%; padding: 14px; margin-top: 6px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.1); background: #0f172a; color: white; box-sizing: border-box; font-size: 1em; outline: none; }

    .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
    .btn { padding: 14px; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 14px; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
    .btn-cam { background: var(--primary); }
    .btn-search { background: transparent; border: 2px solid #334155; }

    /* Estilo da Lista Autocomplete */
    #autocompleteList { position: absolute; width: calc(100% - 50px); background: #1e293b; border: 1px solid #334155; border-radius: 12px; max-height: 200px; overflow-y: auto; z-index: 100; display: none; margin-top: 5px; }
    .suggestion-item { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; display: flex; align-items: center; }

    /* Área de Revisão OCR (Abaixo dos botões) */
    #areaOcr { display: none; margin-top: 25px; background: rgba(59, 130, 246, 0.1); border: 1px solid var(--blue); border-radius: 18px; padding: 15px; animation: fadeIn 0.3s ease; }
    .item-ocr { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 0.85em; }
    .btn-del { color: #ef4444; background: none; border: none; font-size: 1.1rem; cursor: pointer; }

    /* Botões de Ação Inferiores */
    .action-group { margin-top: 30px; display: flex; flex-direction: column; gap: 10px; }
    .btn-action { background: rgba(255, 255, 255, 0.03); border: 1px solid #334155; color: #cbd5e1; border-radius: 14px; padding: 14px; text-align: left; font-size: 0.9em; display: flex; align-items: center; cursor: pointer; }
    .btn-action i { width: 25px; color: var(--primary); }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
  </style>
</head>
<body>

  <div class="smart-card">
    <div class="version-tag">V10.4</div>
    <h1>Smart Scanner</h1>
    <p class="subtitle">Produtos e Preços na sua Planilha</p>
    
    <label>PESQUISAR POR CÓDIGO OU NOME</label>
    <input type="text" id="barcodeInput" placeholder="Ex: Yakult ou 789..." oninput="buscarSugestoes()" autocomplete="off">
    <div id="autocompleteList"></div>
    
    <div class="button-group">
      <button class="btn btn-cam" onclick="toggleScanner()"><i class="fas fa-camera"></i> Câmera</button>
      <button class="btn btn-search" onclick="buscarHibrida()">🔍 Buscar</button>
    </div>

    <div id="reader" style="display:none; margin-top:15px; border-radius:15px; overflow:hidden;"></div>

    <div id="areaOcr">
      <h3 style="color:var(--blue); font-size:0.9em; margin:0;">📋 Revisão do Cupom</h3>
      <p id="ocrStatus" style="font-size:0.7em; color:#94a3b8">Processando...</p>
      
      <label>Confirmar Supermercado</label>
      <select id="selectMercadoOcr"></select>

      <div id="listaItensOcr" style="margin:15px 0; max-height:200px; overflow-y:auto;"></div>
      
      <button class="btn" style="background:var(--primary); width:100%;" onclick="salvarTudoOcr()">✅ SALVAR ITENS</button>
      <button class="btn" style="background:#334155; width:100%; margin-top:5px;" onclick="fecharOcr()">CANCELAR</button>
    </div>

    <div id="areaResultado" style="display:none; margin-top:20px; border-top:1px solid #334155; padding-top:15px;">
        <div id="infoProduto" style="display:flex; align-items:center;">
          <img id="resFoto" style="width:50px; height:50px; background:white; border-radius:8px; margin-right:12px; object-fit:contain;">
          <div><h3 id="resNome" style="margin:0; font-size:0.95em;"></h3><small id="resEan" style="color:#64748b"></small></div>
        </div>
        <div id="listaPrecos" style="margin:15px 0;"></div>
    </div>

    <div class="action-group">
      <button class="btn btn-action" onclick="document.getElementById('fotoCupom').click()">
        <i class="fas fa-file-invoice-dollar"></i> Ler Comprovante com IA
      </button>
      <input type="file" id="fotoCupom" accept="image/*" capture="environment" style="display:none" onchange="processarCupom(this)">
      
      <button class="btn btn-action"><i class="fas fa-clipboard-list"></i> Minha Lista de Compras</button>
      <button class="btn btn-action" onclick="cadastrarLoja()"><i class="fas fa-store"></i> Cadastrar Supermercado</button>
    </div>
  </div>

  <script>
    const URL_BANCO = 'https://vnpoanckjsjggqqtlpxk.supabase.co';
    const CHAVE_ANON = 'sb_publishable_wzxmqxBXAq2s9krb3Q-Eiw_4gHowgs7';
    const supabaseClient = supabase.createClient(URL_BANCO, CHAVE_ANON);

    let html5QrCode, eanAtual, itensOcr = [];

    window.onload = carregarMercados;

    async function carregarMercados() {
      const { data } = await supabaseClient.from('supermercados').select('id, nome').order('nome');
      if (data) {
        const selectOcr = document.getElementById('selectMercadoOcr');
        selectOcr.innerHTML = '<option value="">Onde você está?</option>';
        data.forEach(m => {
          let opt = document.createElement('option');
          opt.value = m.id; opt.innerText = m.nome;
          selectOcr.appendChild(opt);
        });
      }
    }

    // --- OCR CORRIGIDO (v10.4) ---
    async function processarCupom(input) {
      const file = input.files[0]; if(!file) return;
      document.getElementById('areaOcr').style.display = 'block';
      const status = document.getElementById('ocrStatus');
      status.innerText = "⏳ Lendo cupom... (Pode levar 15s)";
      
      const worker = await Tesseract.createWorker('por');
      const { data: { text } } = await worker.recognize(file);
      await worker.terminate();

      status.innerText = "✅ Leitura concluída!";
      analisarTextoOcr(text);
    }

    function analisarTextoOcr(texto) {
      const container = document.getElementById('listaItensOcr');
      container.innerHTML = "";
      itensOcr = [];
      const regexPreco = /(\d+[,\.]\d{2})/g;
      const regexEan = /(\d{13})/g;

      texto.split('\n').forEach((linha, i) => {
        const p = linha.match(regexPreco);
        const e = linha.match(regexEan);
        if (p) {
          const item = { id: i, ean: e ? e[0] : null, preco: parseFloat(p[0].replace(',', '.')), nome: linha.substring(0,25) };
          itensOcr.push(item);
          const div = document.createElement('div');
          div.className = 'item-ocr';
          div.id = `ocr-${i}`;
          div.innerHTML = `<div><b>R$ ${item.preco.toFixed(2)}</b><br><small>${item.nome}</small></div>
                           <button class="btn-del" onclick="removerOcr(${i})">✕</button>`;
          container.appendChild(div);
        }
      });
    }

    function removerOcr(id) {
      itensOcr = itensOcr.filter(it => it.id !== id);
      document.getElementById(`ocr-${id}`).remove();
    }

    async function salvarTudoOcr() {
      const mercadoId = document.getElementById('selectMercadoOcr').value;
      if (!mercadoId) return alert("Selecione o Supermercado!");
      
      for (const it of itensOcr) {
        await supabaseClient.from('precos').insert([{
          produto_id: it.ean, valor: it.preco, supermercado_id: parseInt(mercadoId), data_coleta: new Date().toISOString()
        }]);
      }
      alert("✅ Itens salvos!");
      fecharOcr();
    }

    function fecharOcr() { document.getElementById('areaOcr').style.display='none'; document.getElementById('fotoCupom').value=""; }

    // --- BUSCA E SCANNER (MANTIDOS) ---
    async function buscarHibrida() {
      const t = document.getElementById('barcodeInput').value.trim();
      const { data } = await supabaseClient.from('produtos').select(`id, nome, foto_url, precos(valor, data_coleta, supermercado_id, supermercados(nome))`).or(`id.eq.${t},nome.ilike.%${t}%`).maybeSingle();
      if(data) {
        eanAtual = data.id;
        document.getElementById('areaResultado').style.display = 'block';
        document.getElementById('resNome').innerText = data.nome;
        document.getElementById('resFoto').src = data.foto_url || "";
        const lista = document.getElementById('listaPrecos'); lista.innerHTML = "";
        if(data.precos) {
          data.precos.forEach(p => {
            lista.innerHTML += `<div style="display:flex; justify-content:space-between; padding:8px; background:rgba(255,255,255,0.05); border-radius:8px; margin-bottom:5px;">
                                  <span>${p.supermercados.nome}</span><b>R$ ${p.valor.toFixed(2)}</b>
                                </div>`;
          });
        }
      }
    }

    function toggleScanner() {
      const r = document.getElementById('reader');
      if(r.style.display === 'block') { if(html5QrCode) html5QrCode.stop().then(()=> r.style.display='none'); }
      else { r.style.display='block'; html5QrCode = new Html5Qrcode("reader"); html5QrCode.start({facingMode:"environment"}, {fps:10, qrbox:250}, (t)=>{ document.getElementById('barcodeInput').value=t; html5QrCode.stop().then(()=> {r.style.display='none'; buscarHibrida();}); }); }
    }

    async function cadastrarLoja() { const n = prompt("Supermercado:"); if(n) { await supabaseClient.from('supermercados').insert([{nome:n}]); carregarMercados(); } }
  </script>
</body>
</html>
