<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supermarket Scanner</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; padding: 20px; }
    .container { max-width: 450px; margin: auto; }
    
    input { 
      width: 100%; 
      padding: 12px; 
      margin: 10px 0; 
      border-radius: 8px; 
      border: 1px solid rgba(255,255,255,0.2); 
      background: rgba(0,0,0,0.2); 
      color: white; 
      box-sizing: border-box;
    }
    
    .btn { 
      width: 100%; 
      padding: 15px; 
      background: #10b981; 
      border: none; 
      color: white; 
      font-weight: bold; 
      cursor: pointer; 
      border-radius: 12px; 
      margin-bottom: 10px;
      transition: opacity 0.2s;
    }
    .btn:active { opacity: 0.7; }
    .btn-secondary { background: #3b82f6; }
    /* Estilo para o botão de câmera */
    .btn-camera { background: #8b5cf6; } 
    
    .card { 
      margin-top: 20px; 
      padding: 15px; 
      background: rgba(255,255,255,0.05); 
      border-radius: 16px; 
      border: 1px solid rgba(255,255,255,0.1);
    }
    
    .divider { margin: 30px 0; border-top: 1px solid rgba(255,255,255,0.1); }
    #resultado { margin-top: 15px; padding: 10px; background: rgba(16, 185, 129, 0.1); border-radius: 8px; border: 1px solid #10b981; }
    
    /* Estilo para a prévia da imagem */
    .img-preview { width: 100%; border-radius: 8px; margin-top: 10px; display: none; border: 1px solid rgba(255,255,255,0.2); }
  </style>
</head>
<body>

  <div class="container">
    <h1>Supermarket Scanner</h1>
    <p style="color: #94a3b8;">Sistema de Preços v2 (Supabase)</p>

    <div class="card">
      <label>Consultar Preço</label>
      <input type="text" id="barcode" placeholder="Digite o código de barras">
      <button class="btn" onclick="buscarProduto()">Buscar Produto</button>

      <div id="resultado" style="display: none;">
        <h3 id="prodNome" style="margin: 0;"></h3>
        <p id="prodPreco" style="margin: 5px 0 0 0; color: #10b981; font-weight: bold;"></p>
      </div>
    </div>

    <div class="card">
      <h3>Teste de Foto (Storage)</h3>
      <p style="font-size: 0.8em; color: #94a3b8;">Envie uma foto para o bucket 'fotos-produtos'</p>
      
      <input type="file" id="fotoInput" accept="image/*" capture="environment" style="display: none;">
      
      <button class="btn btn-camera" onclick="document.getElementById('fotoInput').click()">
        📸 Tirar Foto
      </button>

      <div id="statusUpload" style="font-size: 0.9em; margin-top: 5px;"></div>
      <img id="previewFoto" class="img-preview" alt="Prévia">
    </div>

    <div class="divider"></div>

    <div class="card">
      <h3>Novo Supermercado</h3>
      <input type="text" id="nomeMercado" placeholder="Nome do mercado">
      <button class="btn btn-secondary" onclick="salvarMercado()">Salvar no Banco</button>
    </div>
  </div>

  <script>
    const URL_BANCO = 'https://vnpoanckjsjggqqtlpxk.supabase.co'; 
    const CHAVE_ANON = 'sb_publishable_wzxmqxBXAq2s9krb3Q-Eiw_4gHowgs7'; 

    const supabaseClient = supabase.createClient(URL_BANCO, CHAVE_ANON);

    // ==========================================
    // LÓGICA DE UPLOAD DE FOTO (STORAGE)
    // ==========================================
    document.getElementById('fotoInput').addEventListener('change', async function(e) {
      const arquivo = e.target.files[0];
      if (!arquivo) return;

      const status = document.getElementById('statusUpload');
      const preview = document.getElementById('previewFoto');

      // 1. Mostrar preview local imediatamente
      preview.src = URL.createObjectURL(arquivo);
      preview.style.display = 'block';
      status.innerText = "⏳ Enviando...";

      // 2. Nome do arquivo único usando a data atual
      const nomeArquivo = `teste_${Date.now()}.jpg`;

      try {
        // 3. Upload para o bucket 'fotos-produtos'
        const { data, error } = await supabaseClient
          .storage
          .from('fotos-produtos')
          .upload(nomeArquivo, arquivo);

        if (error) throw error;

        // 4. Buscar a URL pública para confirmar
        const { data: urlData } = supabaseClient
          .storage
          .from('fotos-produtos')
          .getPublicUrl(nomeArquivo);

        status.style.color = "#10b981";
        status.innerHTML = `✅ Sucesso!<br><small style="word-break: break-all;">${urlData.publicUrl}</small>`;
        
      } catch (err) {
        console.error(err);
        status.style.color = "#ef4444";
        status.innerText = "❌ Erro: " + err.message;
      }
    });

    // ==========================================
    // FUNÇÃO: BUSCAR PRODUTO
    // ==========================================
    async function buscarProduto() {
      const codigo = document.getElementById('barcode').value.trim();
      const resDiv = document.getElementById('resultado');
      if (!codigo) return alert("Insira um código.");

      try {
        const { data, error } = await supabaseClient
          .from('produtos')
          .select(`nome, precos (valor, mercados (nome))`)
          .eq('id', codigo)
          .single();

        if (error) throw error;

        if (data) {
          resDiv.style.display = 'block';
          document.getElementById('prodNome').innerText = data.nome;
          const infoPreco = data.precos && data.precos[0] 
                            ? `R$ ${data.precos[0].valor.toFixed(2)} (${data.precos[0].mercados.nome})` 
                            : "Sem preço registrado";
          document.getElementById('prodPreco').innerText = infoPreco;
        }
      } catch (err) {
        alert("Produto não encontrado.");
        resDiv.style.display = 'none';
      }
    }

    // ==========================================
    // FUNÇÃO: SALVAR MERCADO
    // ==========================================
    async function salvarMercado() {
      const nomeDigitado = document.getElementById('nomeMercado').value.trim();
      if (!nomeDigitado) return alert("Digite o nome.");

      try {
        const { data, error } = await supabaseClient
          .from('mercados')
          .insert([{ nome: nomeDigitado }])
          .select();

        if (error) throw error;
        alert("Mercado salvo!");
        document.getElementById('nomeMercado').value = ""; 
      } catch (err) {
        alert("Erro: " + err.message);
      }
    }
  </script>
</body>
</html>
