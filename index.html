<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supermarket Scanner v4</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; padding: 20px; }
    .container { max-width: 450px; margin: auto; }
    input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.2); color: white; box-sizing: border-box; }
    
    /* Botões */
    .btn { width: 100%; padding: 15px; background: #10b981; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 12px; margin-bottom: 10px; transition: opacity 0.2s; }
    .btn:active { opacity: 0.7; }
    .btn-secondary { background: #3b82f6; }
    
    /* Cartões */
    .card { margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); }
    
    /* Moldura da Foto */
    .photo-frame { width: 100%; height: 200px; background: rgba(0,0,0,0.3); border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; margin: 10px 0; border: 2px dashed rgba(255,255,255,0.1); }
    .photo-frame img { max-width: 100%; max-height: 100%; object-fit: contain; }
    
    /* Status e Feedback */
    .status { font-size: 0.8em; color: #94a3b8; text-align: center; margin-bottom: 10px; }
    .divider { margin: 30px 0; border-top: 1px solid rgba(255,255,255,0.1); }
  </style>
</head>
<body>

  <div class="container">
    <h1>Supermarket Scanner</h1>
    
    <div class="card">
      <label style="font-size: 0.9em; color: #94a3b8;">Código de Barras (EAN)</label>
      <input type="text" id="mainBarcode" placeholder="Digite ou escaneie o código">
      <button class="btn" onclick="buscarPrincipal()">Buscar</button>
      
      <div id="resultadoBanco" style="display: none; padding: 15px; background: rgba(16,185,129,0.1); border-radius: 12px; margin-top:15px; position: relative;">
        <img id="resFoto" style="width: 80px; height: 80px; float: right; border-radius: 8px; object-fit: contain; background: white; padding: 5px;">
        <h3 id="resNome" style="margin: 0; padding-right: 90px;"></h3>
        <p id="resPreco" style="margin: 5px 0 0 0; color: #10b981; font-weight: bold; font-size: 1.2em;"></p>
        <div style="clear: both;"></div>
      </div>
    </div>

    <div id="secaoCadastro" style="display: none;">
      <div class="divider"></div>
      <div class="card">
        <h3>Cadastrar Novo Produto</h3>
        <p class="status" id="statusInfo">Este produto não está no nosso banco.</p>
        
        <label>Nome do Produto</label>
        <input type="text" id="newName" placeholder="Nome (Ex: Arroz Tio João 5kg)">
        
        <label>Foto do Produto</label>
        <div class="photo-frame" onclick="document.getElementById('fotoInput').click()">
          <img id="preview" src="https://via.placeholder.com/200?text=Sem+Foto">
        </div>
        <input type="file" id="fotoInput" accept="image/*" capture="environment" style="display: none;">
        <p style="font-size: 0.75em; color: #94a3b8; text-align: center; margin-top: -5px;">Toque na imagem para tirar foto manual</p>
        
        <button class="btn btn-secondary" id="btnSalvar" onclick="salvarProduto()" style="margin-top: 20px;">💾 Salvar Produto</button>
      </div>
    </div>
  </div>

  <script>
    // Configurações do Supabase (vnpoanck...)
    const URL_BANCO = 'https://vnpoanckjsjggqqtlpxk.supabase.co';
    const CHAVE_ANON = 'sb_publishable_wzxmqxBXAq2s9krb3Q-Eiw_4gHowgs7';
    const supabaseClient = supabase.createClient(URL_BANCO, CHAVE_ANON);

    let urlFotoFinal = ""; 

    // ==========================================
    // FUNÇÃO PRINCIPAL (O CÉREBRO)
    // ==========================================
    async function buscarPrincipal() {
      const codigo = document.getElementById('mainBarcode').value.trim();
      if (codigo.length < 8) return alert("Digite um código válido.");

      // Limpar estados anteriores
      document.getElementById('resultadoBanco').style.display = 'none';
      document.getElementById('secaoCadastro').style.display = 'none';
      document.getElementById('statusInfo').innerText = "";
      urlFotoFinal = "";

      // PASSO 1: Buscar no NOSSO Banco (Supabase)
      console.log("🔍 Buscando no Supabase...");
      try {
        const { data, error } = await supabaseClient
          .from('produtos')
          .select(`nome, foto_url, precos (valor)`)
          .eq('id', codigo)
          .single();

        if (error || !data) throw new Error("Não encontrado localmente");

        // SE ENCONTROU NO NOSSO BANCO
        console.log("✅ Encontrado localmente!");
        document.getElementById('resultadoBanco').style.display = 'block';
        document.getElementById('resNome').innerText = data.nome;
        document.getElementById('resFoto').src = data.foto_url || "https://via.placeholder.com/80?text=Sem+Foto";
        
        // Lógica de Preço (pega o primeiro encontrado)
        const precoNum = data.precos && data.precos[0] ? parseFloat(data.precos[0].valor) : 0;
        document.getElementById('resPreco').innerText = precoNum > 0 ? `R$ ${precoNum.toFixed(2)}` : "Sem preço";

      } catch (err) {
        // PASSO 2: Se não encontrou no banco, buscar no OpenFoodFacts
        console.log("⚠️ Não encontrado localmente. Buscando na Web...");
        buscarNaWebAutomatico(codigo);
      }
    }

    // ==========================================
    // BUSCA AUTOMÁTICA NA WEB (OPEN FOOD FACTS)
    // ==========================================
    async function buscarNaWebAutomatico(codigo) {
      const secaoCadastro = document.getElementById('secaoCadastro');
      const status = document.getElementById('statusInfo');
      const inputNome = document.getElementById('newName');
      const preview = document.getElementById('preview');

      secaoCadastro.style.display = 'block'; // Mostra o formulário de cadastro
      status.innerText = "🔍 Buscando na Web para facilitar cadastro...";
      inputNome.value = ""; // Limpa o nome anterior
      preview.src = "https://via.placeholder.com/200?text=Sem+Foto"; // Reset foto

      try {
        const response = await fetch(`https://world.openfoodfacts.org/api/v0/product/${codigo}.json`);
        const data = await response.json();

        if (data.status === 1 && data.product) {
          console.log("✅ Encontrado no OpenFoodFacts!");
          
          // Preenche o nome se houver
          const nomeWeb = data.product.product_name || data.product.product_name_pt || "";
          inputNome.value = nomeWeb;
          
          // Preenche a foto se houver
          if (data.product.image_url) {
            urlFotoFinal = data.product.image_url;
            preview.src = urlFotoFinal;
            status.innerText = "✅ Produto e Foto encontrados na Web! Ajuste o nome e salve.";
            status.style.color = "#10b981";
          } else {
            status.innerText = "❌ Produto achado, mas sem foto. Tire uma foto manual.";
            status.style.color = "#94a3b8";
          }
        } else {
          console.log("❌ Não encontrado na Web.");
          status.innerText = "❌ Não encontrado na Web. Digite o nome e tire a foto.";
          status.style.color = "#ef4444";
        }
      } catch (e) {
        status.innerText = "⚠️ Erro na busca da web. Preencha manualmente.";
      }
    }

    // ==========================================
    // LÓGICA DE FOTO MANUAL E COMPRESSÃO
    // ==========================================
    document.getElementById('fotoInput').addEventListener('change', async function(e) {
      const arquivo = e.target.files[0];
      if (!arquivo) return;

      const status = document.getElementById('statusInfo');
      const preview = document.getElementById('preview');
      status.innerText = "⏳ Otimizando foto...";
      status.style.color = "#94a3b8";

      const reader = new FileReader();
      reader.onload = (event) => {
        const img = new Image();
        img.src = event.target.result;
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const MAX = 800; // Máximo 800px para compactação
          let w = img.width, h = img.height;
          if (w > h && w > MAX) { h *= MAX/w; w = MAX; }
          else if (h > MAX) { w *= MAX/h; h = MAX; }
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);

          canvas.toBlob(async (blob) => {
            const nomeArquivo = `man_${Date.now()}.jpg`;
            status.innerText = "⏳ Enviando para o seu Storage...";

            const { data, error } = await supabaseClient.storage
              .from('fotos-produtos')
              .upload(nomeArquivo, blob, { contentType: 'image/jpeg' });

            if (error) return alert("Erro upload: " + error.message);

            const { data: urlData } = supabaseClient.storage
              .from('fotos-produtos')
              .getPublicUrl(nomeArquivo);

            urlFotoFinal = urlData.publicUrl; // Usaremos o nosso link do Supabase
            preview.src = urlFotoFinal;
            preview.style.background = "none";
            status.innerText = `✅ Foto manual salva! (${(blob.size/1024).toFixed(1)} KB)`;
            status.style.color = "#8b5cf6"; // Cor roxa para foto manual
          }, 'image/jpeg', 0.7); // 70% de qualidade
        };
      };
      reader.readAsDataURL(arquivo);
    });

    // ==========================================
    // SALVAR PRODUTO NO SUPABASE (VERSÃO CORRIGIDA)
    // ==========================================
    async function salvarProduto() {
      const id = document.getElementById('mainBarcode').value.trim();
      const nome = document.getElementById('newName').value.trim();
      const btn = document.getElementById('btnSalvar');

      // LOG DE DEBUG: Vamos ver o que tem na variável antes de enviar
      console.log("Tentando salvar produto...");
      console.log("ID:", id);
      console.log("Nome:", nome);
      console.log("URL da Foto que será enviada:", urlFotoFinal);

      if (!id || !nome) {
        return alert("Por favor, preencha o código e o nome!");
      }

      if (!urlFotoFinal || urlFotoFinal === "") {
        return alert("Aguarde a foto carregar ou tire uma foto manual!");
      }

      btn.innerText = "⏳ Gravando no Banco...";
      btn.disabled = true;

      try {
        const { data, error } = await supabaseClient
          .from('produtos')
          .insert([
            { 
              id: id, 
              nome: nome, 
              foto_url: urlFotoFinal // Aqui enviamos a URL capturada
            }
          ])
          .select(); // Pedimos o retorno para confirmar

        if (error) {
           console.error("Erro detalhado do Supabase:", error);
           throw error;
        }

        console.log("Sucesso ao salvar:", data);
        alert("✅ Produto '" + nome + "' cadastrado com sucesso!");
        location.reload(); 

      } catch (err) {
        alert("Erro ao salvar: " + err.message);
        btn.innerText = "💾 Salvar Produto";
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
