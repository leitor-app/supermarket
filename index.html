<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supermarket Scanner v5 - Supabase Edition</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; padding: 20px; }
    .container { max-width: 450px; margin: auto; }
    label { font-size: 0.85em; color: #94a3b8; margin-top: 10px; display: block; }
    input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.2); color: white; box-sizing: border-box; }
    
    .btn { width: 100%; padding: 15px; background: #10b981; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 12px; margin-bottom: 10px; transition: opacity 0.2s; }
    .btn:disabled { background: #334155; cursor: not-allowed; }
    .btn-secondary { background: #3b82f6; }
    
    .card { margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); }
    
    .photo-frame { width: 100%; height: 200px; background: rgba(0,0,0,0.3); border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; margin: 10px 0; border: 2px dashed rgba(255,255,255,0.1); }
    .photo-frame img { max-width: 100%; max-height: 100%; object-fit: contain; }
    
    .status { font-size: 0.8em; color: #94a3b8; text-align: center; margin-bottom: 10px; }
    .divider { margin: 30px 0; border-top: 1px solid rgba(255,255,255,0.1); }
  </style>
</head>
<body>

  <div class="container">
    <h1>Supermarket Scanner</h1>
    
    <div class="card">
      <label>Código de Barras (EAN)</label>
      <input type="text" id="mainBarcode" placeholder="Escaneie o código">
      <button class="btn" onclick="buscarPrincipal()">🔍 Buscar Produto</button>
      
      <div id="resultadoBanco" style="display: none; padding: 15px; background: rgba(16,185,129,0.1); border-radius: 12px; margin-top:15px;">
        <img id="resFoto" style="width: 80px; height: 80px; float: right; border-radius: 8px; object-fit: contain; background: white; padding: 5px;">
        <h3 id="resNome" style="margin: 0;"></h3>
        <p id="resPreco" style="margin: 5px 0 0 0; color: #10b981; font-weight: bold; font-size: 1.2em;"></p>
        <div style="clear: both;"></div>
      </div>
    </div>

    <div id="secaoCadastro" style="display: none;">
      <div class="divider"></div>
      <div class="card">
        <h3>Novo Cadastro</h3>
        <p class="status" id="statusInfo"></p>
        
        <label>Nome do Produto</label>
        <input type="text" id="newName" placeholder="Ex: Arroz Tio João 5kg">
        
        <label>Foto do Produto (Toque para mudar)</label>
        <div class="photo-frame" onclick="document.getElementById('fotoInput').click()">
          <img id="preview" src="https://via.placeholder.com/200?text=Sem+Foto">
        </div>
        <input type="file" id="fotoInput" accept="image/*" capture="environment" style="display: none;">

        <label>Preço Atual (R$)</label>
        <input type="number" id="newPrice" step="0.01" placeholder="0.00">

        <label>Nome do Supermercado (Exato)</label>
        <input type="text" id="supermercadoInput" placeholder="Ex: Carrefour">
        
        <button class="btn btn-secondary" id="btnSalvar" onclick="salvarTudo()">💾 Salvar no Banco</button>
      </div>
    </div>
  </div>

  <script>
    const URL_BANCO = 'https://vnpoanckjsjggqqtlpxk.supabase.co';
    const CHAVE_ANON = 'sb_publishable_wzxmqxBXAq2s9krb3Q-Eiw_4gHowgs7';
    const supabaseClient = supabase.createClient(URL_BANCO, CHAVE_ANON);

    let urlFotoTemporaria = ""; // Pode ser da web ou local

    async function buscarPrincipal() {
      const codigo = document.getElementById('mainBarcode').value.trim();
      if (codigo.length < 8) return alert("Código inválido.");

      document.getElementById('resultadoBanco').style.display = 'none';
      document.getElementById('secaoCadastro').style.display = 'none';
      urlFotoTemporaria = "";

      // 1. Busca no Supabase
      const { data, error } = await supabaseClient
        .from('produtos')
        .select(`nome, foto_url, precos (valor)`)
        .eq('id', codigo)
        .maybeSingle();

      if (data) {
        document.getElementById('resultadoBanco').style.display = 'block';
        document.getElementById('resNome').innerText = data.nome;
        document.getElementById('resFoto').src = data.foto_url || "";
        const preco = data.precos?.[0]?.valor || 0;
        document.getElementById('resPreco').innerText = `R$ ${preco.toFixed(2)}`;
      } else {
        buscarNaWeb(codigo);
      }
    }

    async function buscarNaWeb(codigo) {
      document.getElementById('secaoCadastro').style.display = 'block';
      const status = document.getElementById('statusInfo');
      status.innerText = "🔍 Buscando na Web...";

      try {
        const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${codigo}.json`);
        const json = await res.json();

        if (json.status === 1) {
          document.getElementById('newName').value = json.product.product_name || "";
          urlFotoTemporaria = json.product.image_url || "";
          document.getElementById('preview').src = urlFotoTemporaria || "https://via.placeholder.com/200?text=Sem+Foto";
          status.innerText = "✅ Sugestão encontrada!";
        } else {
          status.innerText = "⚠️ Não encontrado na Web. Preencha tudo.";
        }
      } catch (e) {
        status.innerText = "⚠️ Erro de conexão com a Web.";
      }
    }

    // Lógica de Foto Manual (Câmera)
    document.getElementById('fotoInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
          document.getElementById('preview').src = event.target.result;
          urlFotoTemporaria = "LOCAL_FILE"; // Marcador para sabermos que é upload
        };
        reader.readAsDataURL(file);
      }
    });

    async function salvarTudo() {
      const id = document.getElementById('mainBarcode').value.trim();
      const nome = document.getElementById('newName').value.trim();
      const preco = document.getElementById('newPrice').value;
      const lojaNome = document.getElementById('supermercadoInput').value.trim();
      const btn = document.getElementById('btnSalvar');

      if (!id || !nome || !preco || !lojaNome) return alert("Preencha todos os campos!");

      btn.innerText = "⏳ Processando...";
      btn.disabled = true;

      try {
        // 1. Validar Loja
        const { data: loja } = await supabaseClient.from('supermercados').select('id').eq('nome', lojaNome).maybeSingle();
        if (!loja) throw new Error("Supermercado não cadastrado!");

        let urlFinalParaBanco = urlFotoTemporaria;

        // 2. Tratar Foto (Se for Web ou Local, sobe pro Storage agora)
        if (urlFotoTemporaria && urlFotoTemporaria !== "") {
          let blob;
          if (urlFotoTemporaria === "LOCAL_FILE") {
            blob = document.getElementById('fotoInput').files[0];
          } else if (urlFotoTemporaria.includes('http')) {
            const resImg = await fetch(urlFotoTemporaria);
            blob = await resImg.blob();
          }

          if (blob) {
            const fileName = `${id}_${Date.now()}.jpg`;
            await supabaseClient.storage.from('fotos-produtos').upload(fileName, blob);
            const { data: pub } = supabaseClient.storage.from('fotos-produtos').getPublicUrl(fileName);
            urlFinalParaBanco = pub.publicUrl;
          }
        }

        // 3. Upsert Produto
        await supabaseClient.from('produtos').upsert({ id, nome, foto_url: urlFinalParaBanco });

        // 4. Insert Preço
        await supabaseClient.from('precos').insert({
          produto_id: id,
          valor: parseFloat(preco),
          supermercado_id: loja.id,
          data_coleta: new Date().toISOString()
        });

        alert("✅ Salvo com sucesso!");
        location.reload();
      } catch (err) {
        alert(err.message);
        btn.disabled = false;
        btn.innerText = "💾 Salvar no Banco";
      }
    }
  </script>
</body>
</html>
