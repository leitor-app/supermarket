<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Scanner v7 - Visual Original</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* Resetando margens e aplicando estilo base */
    body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    
    /* Container Principal - Layout idêntico à imagem */
    .smart-card { width: 380px; background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 25px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4); backdrop-filter: blur(10px); display: flex; flex-direction: column; }
    
    /* Título e Subtítulo */
    h1 { text-align: center; color: #10b981; font-size: 1.8rem; margin: 0; font-weight: 700; }
    .subtitle { text-align: center; color: rgba(255, 255, 255, 0.6); font-size: 0.9em; margin-top: 5px; }
    
    /* Rótulo e Campo de Entrada */
    label { font-size: 0.8em; color: rgba(255, 255, 255, 0.7); text-transform: uppercase; font-weight: 600; margin-top: 25px; }
    .search-input { width: 100%; padding: 15px; margin-top: 5px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.1); background: #111827; color: rgba(255, 255, 255, 0.8); box-sizing: border-box; font-size: 1.1em; }
    
    /* Botões Principais */
    .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
    .btn { padding: 12px; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1em; transition: 0.2s; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { background: #334155 !important; color: rgba(255,255,255,0.5) !important; cursor: not-allowed; }
    
    .btn-cam { background: #10b981; }
    .btn-search { background: transparent; border: 2px solid #334155; color: rgba(255, 255, 255, 0.8); }
    
    .btn i { margin-right: 10px; }
    
    /* Botões de Ação Inferiores - Layout da imagem */
    .action-group { margin-top: auto; display: flex; flex-direction: column; gap: 10px; padding-top: 30px; }
    .btn-action { background: rgba(255, 255, 255, 0.03); border: 2px solid #334155; color: rgba(255, 255, 255, 0.7); border-radius: 12px; font-weight: 600; padding: 12px; justify-content: start; text-align: left; transition: 0.2s; }
    .btn-action:hover { background: rgba(255, 255, 255, 0.05); }
    .btn-action:active { background: rgba(255, 255, 255, 0.08); transform: scale(0.98); }
    .btn-action i { width: 30px; }
    
    /* DIVS de Feedback (Ocultas inicialmente) */
    #statusColeta { display: none; text-align: center; color: #fbbf24; font-size: 0.85em; margin-top: 15px; }
    #visualizacaoFoto { display: none; margin-top: 15px; border-radius: 12px; background: rgba(255,255,255,0.02); padding: 10px; border: 1px dashed rgba(255,255,255,0.1); }
    #previewFotoProduto { width: 100%; height: 150px; object-fit: contain; }

  </style>
</head>
<body>

  <div class="smart-card">
    <h1>Smart Scanner</h1>
    <p class="subtitle">Produtos e Preços na sua Planilha</p>
    
    <label>PESQUISAR POR CÓDIGO OU NOME</label>
    <input type="text" id="barcodeInput" class="search-input" placeholder="Ex: Yakult ou 789...">
    
    <div class="button-group">
      <button class="btn btn-cam" onclick="ativarCameraParaColeta()">
        <i class="fas fa-camera"></i> Câmera
      </button>
      <button class="btn btn-search" id="btnBuscar" onclick="executarBuscaHibrida()">
        <i class="fas fa-search"></i> Buscar
      </button>
    </div>
    
    <p id="statusColeta"></p>
    
    <div id="visualizacaoFoto">
      <img id="previewFotoProduto" src="">
    </div>

    <div class="action-group">
      <button class="btn btn-action" onclick="ativarCameraComIA()">
        <i class="fas fa-file-invoice-dollar"></i> Ler Comprovante com IA
      </button>
      <button class="btn btn-action">
        <i class="fas fa-clipboard-list"></i> Minha Lista de Compras
      </button>
      <button class="btn btn-action" id="btnLoja" onclick="fluxoCadastrarLoja()">
        <i class="fas fa-store"></i> Cadastrar Supermercado
      </button>
    </div>
  </div>

  <input type="file" id="fotoInputHidden" accept="image/*" capture="environment" style="display: none;">

  <script>
    // CONFIG SUPABASE
    const URL_BANCO = 'https://vnpoanckjsjggqqtlpxk.supabase.co';
    const CHAVE_ANON = 'sb_publishable_wzxmqxBXAq2s9krb3Q-Eiw_4gHowgs7';
    const supabaseClient = supabase.createClient(URL_BANCO, CHAVE_ANON);

    let urlFotoTemporaria = ""; 

    // --- FUNÇÃO CADASTRO DE LOJA ---
    async function fluxoCadastrarLoja() {
      const nomeLoja = prompt("Digite o nome exato do novo Supermercado:");
      if (!nomeLoja) return;
      const { error } = await supabaseClient.from('supermercados').insert([{ nome: nomeLoja }]);
      if (error) alert("❌ Erro: " + error.message);
      else alert("✅ Supermercado '" + nomeLoja + "' cadastrado!");
    }

    // --- FUNÇÃO BUSCAHIBRIDA (COPIADA DO CÓDIGO ANTERIOR) ---
    async function executarBuscaHibrida() {
      const codigo = document.getElementById('barcodeInput').value.trim();
      if (!codigo) return;

      const status = document.getElementById('statusColeta');
      status.style.display = 'block';
      status.innerText = "🔍 Buscando dados...";
      status.style.color = "#fbbf24";

      try {
        const { data, error } = await supabaseClient
          .from('produtos')
          .select(`nome, foto_url, precos (valor)`)
          .eq('id', codigo)
          .maybeSingle();

        if (data) {
          executarFluxoDePreco(data, codigo);
        } else {
          buscarNaWebEPreco(codigo);
        }
      } catch (err) { console.error("Erro busca:", err); }
    }

    // --- FLUXOS DE SALVAMENTO DE PREÇO (COPIADO ANTERIORMENTE) ---
    function executarFluxoDePreco(produto, codigo) {
      const status = document.getElementById('statusColeta');
      const preview = document.getElementById('visualizacaoFoto');
      const imgPreview = document.getElementById('previewFotoProduto');
      
      status.style.display = 'block';
      preview.style.display = 'block';
      status.style.color = "#10b981";
      status.innerText = `✅ Achou: ${produto.nome}`;
      imgPreview.src = produto.foto_url || "";
      
      promptParaSalvarPreco(produto.nome, codigo);
    }

    async function promptParaSalvarPreco(nome, codigo) {
      const supermercadoInput = prompt(`Digite o Supermercado para o produto ${nome}:`);
      if (!supermercadoInput) return;
      
      // Valida loja
      const { data: loja } = await supabaseClient.from('supermercados').select('id').eq('nome', supermercadoInput).maybeSingle();
      if (!loja) return alert("❌ Supermercado não cadastrado! Use o botão abaixo.");

      const precoInput = prompt(`Digite o preço para o produto ${nome}:`);
      if (!precoInput) return;

      // Salva o preço
      await supabaseClient.from('precos').insert({
        produto_id: codigo,
        valor: parseFloat(precoInput.replace(',', '.')),
        supermercado_id: loja.id,
        data_coleta: new Date().toISOString()
      });
      
      alert("✅ Preço salvo!");
    }

    async function buscarNaWebEPreco(codigo) {
      // (mesma lógica de busca na web e clonagem de foto do código anterior)
      // para simplificar este layout, o ideal é usar a câmera manual se não achar.
      alert("Este produto não está no banco. Tire uma foto manual com a câmera para cadastrar.");
      ativarCameraParaColeta();
    }

    // --- FUNÇÃO CÂMERA MANUAL ---
    function ativarCameraParaColeta() {
      document.getElementById('fotoInputHidden').click();
    }

    document.getElementById('fotoInputHidden').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (ev) => {
          const preview = document.getElementById('visualizacaoFoto');
          const imgPreview = document.getElementById('previewFotoProduto');
          const status = document.getElementById('statusColeta');

          preview.style.display = 'block';
          imgPreview.src = ev.target.result;
          status.style.display = 'block';
          status.innerText = "✅ Foto capturada! Cadastre o preço agora.";
          status.style.color = "#8b5cf6";
          urlFotoTemporaria = "LOCAL_FILE"; // Marcador para upload
        };
        reader.readAsDataURL(file);
      }
    });

    // Funções extras da imagem (para implementação futura)
    function ativarCameraComIA() { alert("Leitura de Comprovante com IA (Funcionalidade Futura)"); }

  </script>
</body>
</html>
