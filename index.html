<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Scanner v10.3 - Revisão OCR</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src='https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js'></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root { --primary: #10b981; --bg: #0f172a; --card: rgba(30, 41, 59, 0.9); --blue: #3b82f6; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; display: flex; justify-content: center; }
    
    .smart-card { width: 100%; max-width: 450px; background: var(--card); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 20px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5); backdrop-filter: blur(15px); }
    .version-tag { position: absolute; top: 10px; right: 20px; font-size: 0.6em; color: rgba(255,255,255,0.3); }
    
    h1 { text-align: center; color: var(--primary); margin: 0; }
    label { font-size: 0.75em; color: #94a3b8; text-transform: uppercase; font-weight: 700; margin-top: 15px; display: block; }
    
    input, select { width: 100%; padding: 12px; margin-top: 5px; border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.1); background: #1e293b; color: white; box-sizing: border-box; }

    /* Modal / Overlay de Revisão */
    #modalOcr { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; padding: 20px; box-sizing: border-box; overflow-y: auto; }
    .revisao-container { background: #1e293b; border-radius: 20px; padding: 20px; max-width: 500px; margin: auto; border: 1px solid var(--blue); }
    
    .item-revisao { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.05); margin-bottom: 10px; padding: 12px; border-radius: 12px; }
    .item-revisao div { flex: 1; }
    .btn-remove { color: #ef4444; background: none; border: none; cursor: pointer; font-size: 1.2rem; margin-left: 10px; }
    
    .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
    .btn-save-all { background: var(--primary); color: white; font-size: 1rem; }
    .btn-cancel { background: #334155; color: white; margin-top: 5px; }

    .action-group { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
    .btn-action { background: rgba(255,255,255,0.03); border: 1px solid #334155; color: #cbd5e1; text-align: left; padding: 15px; border-radius: 12px; display: flex; align-items: center; }
  </style>
</head>
<body>

  <div class="smart-card">
    <div class="version-tag">VERSÃO 10.3</div>
    <h1>Smart Scanner</h1>
    
    <label>Buscar Produto</label>
    <input type="text" id="barcodeInput" placeholder="EAN ou Nome..." oninput="buscarSugestoes()" autocomplete="off">
    <div id="autocompleteList" class="autocomplete-list"></div>

    <div class="action-group">
      <button class="btn-action" onclick="document.getElementById('fotoCupom').click()">
        <i class="fas fa-file-invoice-dollar" style="color:var(--blue); font-size: 1.2rem;"></i> &nbsp; <b>Ler Cupom Fiscal (IA)</b>
      </button>
      <input type="file" id="fotoCupom" accept="image/*" capture="environment" style="display:none" onchange="iniciarOcr(this)">
      
      <button class="btn-action" onclick="toggleScanner()">
        <i class="fas fa-barcode" style="color:var(--primary); font-size: 1.2rem;"></i> &nbsp; Scanner de Câmera
      </button>
    </div>

    <div id="reader" style="display:none; margin-top:15px; border-radius:15px; overflow:hidden;"></div>

    <div id="areaResultado" style="display:none; margin-top:20px; padding-top:15px; border-top:1px solid #334155;">
       <h3 id="resNome"></h3>
       <div id="listaPrecos"></div>
    </div>
  </div>

  <div id="modalOcr">
    <div class="revisao-container">
      <h2 style="color:var(--blue); margin-top:0;">📋 Revisão do Cupom</h2>
      <p id="ocrStatus" style="font-size:0.8em; color:#94a3b8;">Aguarde o processamento...</p>
      
      <label>Selecionar Supermercado</label>
      <select id="selectMercadoOcr">
        <option value="">Onde você comprou?</option>
      </select>

      <div id="listaItensRevisao" style="margin-top:20px;"></div>

      <button class="btn btn-save-all" id="btnFinalizarOcr" onclick="salvarTudoOcr()" style="display:none;">
        <i class="fas fa-cloud-upload-alt"></i> SALVAR TODOS OS ITENS
      </button>
      <button class="btn btn-cancel" onclick="fecharModalOcr()">CANCELAR</button>
    </div>
  </div>

  <script>
    const URL_BANCO = 'https://vnpoanckjsjggqqtlpxk.supabase.co';
    const CHAVE_ANON = 'sb_publishable_wzxmqxBXAq2s9krb3Q-Eiw_4gHowgs7';
    const supabaseClient = supabase.createClient(URL_BANCO, CHAVE_ANON);

    let itensDetectadosGlobal = [];

    window.onload = async () => {
      const { data } = await supabaseClient.from('supermercados').select('id, nome').order('nome');
      if (data) {
        const selects = [document.getElementById('selectMercadoOcr')];
        selects.forEach(s => {
          data.forEach(m => {
            let opt = document.createElement('option');
            opt.value = m.id; opt.innerText = m.nome;
            s.appendChild(opt);
          });
        });
      }
    };

    // --- LÓGICA OCR v10.3 ---
    async function iniciarOcr(input) {
      const file = input.files[0]; if(!file) return;
      document.getElementById('modalOcr').style.display = 'block';
      const status = document.getElementById('ocrStatus');
      status.innerText = "⏳ IA analisando cupom... (Aprox. 10-15s)";
      
      Tesseract.recognize(file, 'por').then(({ data: { text } }) => {
        status.innerText = "✅ Análise concluída! Remova o que não for produto.";
        document.getElementById('btnFinalizarOcr').style.display = 'block';
        processarTextoParaRevisao(text);
      });
    }

    function processarTextoParaRevisao(texto) {
      const listaDiv = document.getElementById('listaItensRevisao');
      listaDiv.innerHTML = "";
      itensDetectadosGlobal = [];

      const regexPreco = /(\d+[,\.]\d{2})/g;
      const regexEan = /(\d{13})/g;

      texto.split('\n').forEach((linha, index) => {
        const pMatch = linha.match(regexPreco);
        const eMatch = linha.match(regexEan);

        if (pMatch) {
          const item = {
            idTemp: index,
            ean: eMatch ? eMatch[0] : null,
            preco: parseFloat(pMatch[0].replace(',', '.')),
            nomeOriginal: linha.substring(0, 30).trim()
          };
          itensDetectadosGlobal.push(item);
          renderizarItemRevisao(item);
        }
      });
    }

    function renderizarItemRevisao(item) {
      const listaDiv = document.getElementById('listaItensRevisao');
      const div = document.createElement('div');
      div.className = 'item-revisao';
      div.id = `item-${item.idTemp}`;
      div.innerHTML = `
        <div>
          <b>R$ ${item.preco.toFixed(2)}</b><br>
          <small style="color:#94a3b8">${item.nomeOriginal} ${item.ean ? '('+item.ean+')' : ''}</small>
        </div>
        <button class="btn-remove" onclick="removerItemOcr(${item.idTemp})">
          <i class="fas fa-times-circle"></i>
        </button>
      `;
      listaDiv.appendChild(div);
    }

    function removerItemOcr(idTemp) {
      itensDetectadosGlobal = itensDetectadosGlobal.filter(i => i.idTemp !== idTemp);
      document.getElementById(`item-${idTemp}`).remove();
    }

    async function salvarTudoOcr() {
      const mercadoId = document.getElementById('selectMercadoOcr').value;
      if (!mercadoId) return alert("⚠️ Selecione o supermercado primeiro!");
      if (itensDetectadosGlobal.length === 0) return alert("Lista vazia!");

      const btn = document.getElementById('btnFinalizarOcr');
      btn.disabled = true;
      btn.innerText = "⏳ Salvando no banco...";

      let salvos = 0;
      for (const item of itensDetectadosGlobal) {
        // Lógica de UPSERT ou INSERT (evitar duplicados no mesmo dia/loja)
        const { error } = await supabaseClient.from('precos').insert([{
          produto_id: item.ean,
          valor: item.preco,
          supermercado_id: parseInt(mercadoId),
          data_coleta: new Date().toISOString()
        }]);
        if(!error) salvos++;
      }

      alert(`✅ Sucesso! ${salvos} itens foram processados.`);
      fecharModalOcr();
    }

    function fecharModalOcr() {
      document.getElementById('modalOcr').style.display = 'none';
      document.getElementById('fotoCupom').value = "";
    }

    // --- (Scanner e Autocomplete mantidos da v10.1) ---
    function toggleScanner() { /* ... lógica anterior ... */ }
    async function buscarSugestoes() { /* ... lógica anterior ... */ }
  </script>
</body>
</html>
