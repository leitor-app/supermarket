<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Scanner v10.2 - OCR & Padronização</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src='https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js'></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root { --primary: #10b981; --bg: #0f172a; --card: rgba(30, 41, 59, 0.8); }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
    
    .smart-card { width: 100%; max-width: 420px; background: var(--card); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 20px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5); backdrop-filter: blur(15px); position: relative; }
    .version-tag { position: absolute; top: 10px; right: 20px; font-size: 0.6em; color: rgba(255,255,255,0.3); font-weight: bold; }
    
    h1 { text-align: center; color: var(--primary); font-size: 1.6rem; margin: 0; font-weight: 700; }
    label { font-size: 0.7em; color: #94a3b8; text-transform: uppercase; font-weight: 700; margin-top: 15px; display: block; }
    
    input, select { width: 100%; padding: 12px; margin-top: 5px; border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.1); background: #0f172a; color: white; box-sizing: border-box; font-size: 1em; outline: none; }
    input:focus { border-color: var(--primary); }

    /* Autocomplete List */
    .autocomplete-list { position: absolute; width: calc(100% - 40px); background: #1e293b; border: 1px solid #334155; border-radius: 0 0 12px 12px; max-height: 200px; overflow-y: auto; z-index: 100; display: none; }
    .suggestion-item { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; display: flex; align-items: center; }
    .suggestion-item:hover { background: #334155; }
    .suggestion-item img { width: 30px; height: 30px; border-radius: 4px; margin-right: 10px; background: white; object-fit: contain; }

    /* Botões */
    .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
    .btn { padding: 12px; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 12px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
    .btn-cam { background: var(--primary); }
    .btn-search { background: transparent; border: 2px solid #334155; }
    .btn-save { width: 100%; background: var(--primary); margin-top: 10px; }

    /* Scanner e Resultados */
    #reader { width: 100%; border-radius: 12px; overflow: hidden; margin-top: 15px; display: none; border: 2px solid var(--primary); }
    #areaResultado { display: none; margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
    
    .scroll-precos { max-height: 150px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin: 10px 0; }
    .card-preco { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
    .card-preco.mais-barato { border-left: 4px solid var(--primary); background: rgba(16, 185, 129, 0.08); }

    /* Seção OCR */
    #listaOcr { display: none; margin-top: 20px; background: rgba(59, 130, 246, 0.05); border-radius: 15px; padding: 15px; border: 1px solid #3b82f6; }
    .item-ocr { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.8em; }
    .btn-confirm { background: var(--primary); padding: 4px 8px; border-radius: 6px; border: none; color: white; cursor: pointer; font-size: 0.8em; }

    .action-group { margin-top: 20px; display: flex; flex-direction: column; gap: 8px; }
    .btn-action { background: rgba(255, 255, 255, 0.02); border: 1px solid #334155; color: #cbd5e1; border-radius: 12px; padding: 12px; text-align: left; font-size: 0.85em; display: flex; align-items: center; cursor: pointer; }
  </style>
</head>
<body>

  <div class="smart-card">
    <div class="version-tag">VERSÃO 10.2</div>
    <h1>Smart Scanner</h1>
    
    <label>Pesquisar Produto</label>
    <input type="text" id="barcodeInput" placeholder="Escaneie ou digite o nome..." oninput="buscarSugestoes()" autocomplete="off">
    <div id="autocompleteList" class="autocomplete-list"></div>
    
    <div class="button-group">
      <button class="btn btn-cam" onclick="toggleScanner()"><i class="fas fa-camera"></i> Câmera</button>
      <button class="btn btn-search" onclick="buscarHibrida()">🔍 Buscar</button>
    </div>

    <div id="reader"></div>

    <div id="areaResultado">
      <div style="display:flex; align-items:center; margin-bottom:10px;">
        <img id="resFoto" style="width:50px; height:50px; object-fit:contain; background:white; border-radius:8px; margin-right:12px;">
        <div>
          <h3 id="resNome" style="margin:0; font-size:0.9em;"></h3>
          <small id="resEan" style="color:#64748b; font-size:0.7em;"></small>
        </div>
      </div>
      <div id="listaPrecos" class="scroll-precos"></div>
    </div>

    <div class="price-form" style="margin-top:15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top:10px;">
      <label>Valor Unitário (R$)</label>
      <input type="number" id="inputPreco" step="0.01" placeholder="0.00">
      
      <label>Supermercado (Obrigatório)</label>
      <select id="selectMercado">
        <option value="">Selecione um Supermercado...</option>
      </select>
      
      <button class="btn btn-save" onclick="salvarNovoPreco()">💾 SALVAR NO BANCO</button>
    </div>

    <div id="listaOcr">
      <h3 style="font-size:0.85em; color:#3b82f6; margin:0 0 10px 0;">📝 Itens Detectados no Cupom</h3>
      <p id="ocrStatus" style="font-size:0.7em; color:#94a3b8">Aguardando foto...</p>
      <div id="itensDetectados"></div>
    </div>

    <div class="action-group">
      <button class="btn btn-action" onclick="document.getElementById('fotoCupom').click()">
        <i class="fas fa-file-invoice-dollar" style="color:var(--primary)"></i> &nbsp; Ler Comprovante (IA)
      </button>
      <input type="file" id="fotoCupom" accept="image/*" capture="environment" style="display:none" onchange="processarCupom(this)">
      <button class="btn btn-action" onclick="cadastrarLoja()"><i class="fas fa-store"></i> &nbsp; Cadastrar Supermercado</button>
    </div>
  </div>

  <script>
    const URL_BANCO = 'https://vnpoanckjsjggqqtlpxk.supabase.co';
    const CHAVE_ANON = 'sb_publishable_wzxmqxBXAq2s9krb3Q-Eiw_4gHowgs7';
    const supabaseClient = supabase.createClient(URL_BANCO, CHAVE_ANON);

    let html5QrCode;
    let eanAtual = "";
    let timeoutBusca = null;

    window.onload = carregarMercados;

    async function carregarMercados() {
      const { data } = await supabaseClient.from('supermercados').select('id, nome').order('nome');
      const select = document.getElementById('selectMercado');
      if (data) {
        select.innerHTML = '<option value="">Selecione um Supermercado...</option>';
        data.forEach(m => {
          let opt = document.createElement('option');
          opt.value = m.id; opt.innerText = m.nome;
          select.appendChild(opt);
        });
      }
    }

    // --- AUTOCOMPLETE ---
    async function buscarSugestoes() {
      const termo = document.getElementById('barcodeInput').value.trim();
      const lista = document.getElementById('autocompleteList');
      if (termo.length < 2) { lista.style.display = 'none'; return; }

      clearTimeout(timeoutBusca);
      timeoutBusca = setTimeout(async () => {
        const { data } = await supabaseClient.from('produtos').select('id, nome, foto_url').ilike('nome', `%${termo}%`).limit(5);
        if (data && data.length > 0) {
          lista.innerHTML = ""; lista.style.display = 'block';
          data.forEach(p => {
            const item = document.createElement('div');
            item.className = 'suggestion-item';
            item.innerHTML = `<img src="${p.foto_url || ''}"><div>${p.nome}</div>`;
            item.onclick = () => { document.getElementById('barcodeInput').value = p.id; lista.style.display = 'none'; buscarHibrida(); };
            lista.appendChild(item);
          });
        } else { lista.style.display = 'none'; }
      }, 300);
    }

    // --- SCANNER ---
    function toggleScanner() {
      const readerDiv = document.getElementById('reader');
      if (readerDiv.style.display === 'block') { 
        if(html5QrCode) html5QrCode.stop().then(() => readerDiv.style.display = 'none');
      } else { 
        readerDiv.style.display = 'block'; 
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
          document.getElementById('barcodeInput').value = text;
          html5QrCode.stop().then(() => { readerDiv.style.display = 'none'; buscarHibrida(); });
        });
      }
    }

    // --- BUSCA E RESULTADOS ---
    async function buscarHibrida() {
      const termo = document.getElementById('barcodeInput').value.trim();
      if (!termo) return;
      const { data } = await supabaseClient.from('produtos').select(`id, nome, foto_url, precos (valor, data_coleta, supermercado_id, supermercados (nome))`).or(`id.eq.${termo},nome.ilike.%${termo}%`).maybeSingle();
      if (data) {
        eanAtual = data.id;
        document.getElementById('areaResultado').style.display = 'block';
        document.getElementById('resNome').innerText = data.nome;
        document.getElementById('resEan').innerText = "EAN: " + data.id;
        document.getElementById('resFoto').src = data.foto_url || "";
        
        const listaDiv = document.getElementById('listaPrecos');
        listaDiv.innerHTML = "";
        if (data.precos && data.precos.length > 0) {
           const ultimos = {};
           data.precos.forEach(p => { if(!ultimos[p.supermercado_id] || new Date(p.data_coleta) > new Date(ultimos[p.supermercado_id].data_coleta)) ultimos[p.supermercado_id] = p; });
           const ordenados = Object.values(ultimos).sort((a,b) => a.valor - b.valor);
           ordenados.forEach(p => {
             const card = document.createElement('div');
             card.className = `card-preco ${p.valor === ordenados[0].valor ? 'mais-barato' : ''}`;
             card.onclick = () => { document.getElementById('selectMercado').value = p.supermercado_id; document.getElementById('inputPreco').value = p.valor; };
             card.innerHTML = `<span>${p.supermercados.nome}</span><b style="color:var(--primary)">R$ ${p.valor.toFixed(2)}</b>`;
             listaDiv.appendChild(card);
           });
        }
      }
    }

    // --- SALVAMENTO PADRONIZADO ---
    async function salvarNovoPreco() {
      const preco = document.getElementById('inputPreco').value;
      const mercadoId = document.getElementById('selectMercado').value;
      if (!preco || !mercadoId || !eanAtual) return alert("⚠️ Selecione o mercado e informe o preço!");

      const { error } = await supabaseClient.from('precos').insert([{
        produto_id: eanAtual, valor: parseFloat(preco), supermercado_id: parseInt(mercadoId), data_coleta: new Date().toISOString()
      }]);
      if(!error) { alert("✅ Salvo!"); buscarHibrida(); } else { alert("Erro: " + error.message); }
    }

    // --- OCR IA (CUPOM FISCAL) ---
    async function processarCupom(input) {
      const file = input.files[0]; if (!file) return;
      const status = document.getElementById('ocrStatus');
      const listaDiv = document.getElementById('listaOcr');
      const itensDiv = document.getElementById('itensDetectados');

      listaDiv.style.display = 'block';
      status.innerText = "⏳ Analisando cupom... Aguarde.";
      itensDiv.innerHTML = "";

      Tesseract.recognize(file, 'por').then(({ data: { text } }) => {
        status.innerText = "✅ Itens detectados. Escolha o mercado acima antes de confirmar!";
        const regexPreco = /(\d+[,\.]\d{2})/g;
        const regexEan = /(\d{13})/g;
        text.split('\n').forEach(linha => {
          const pMatch = linha.match(regexPreco);
          const eMatch = linha.match(regexEan);
          if (pMatch) {
            const preco = pMatch[0].replace(',', '.');
            const ean = eMatch ? eMatch[0] : "S/ Código";
            const div = document.createElement('div');
            div.className = 'item-ocr';
            div.innerHTML = `<div><b>R$ ${preco}</b><br><small>${linha.substring(0,20)}</small></div><button class="btn-confirm" onclick="salvarOcrItem('${ean}', '${preco}')">Confirmar</button>`;
            itensDiv.appendChild(div);
          }
        });
      });
    }

    async function salvarOcrItem(ean, preco) {
      const mercadoId = document.getElementById('selectMercado').value;
      if (!mercadoId) return alert("⚠️ Selecione o Mercado no menu acima primeiro!");

      const { error } = await supabaseClient.from('precos').insert([{
        produto_id: ean === "S/ Código" ? null : ean,
        valor: parseFloat(preco),
        supermercado_id: parseInt(mercadoId),
        data_coleta: new Date().toISOString()
      }]);
      if(!error) alert("✅ Item do cupom salvo!");
    }

    async function cadastrarLoja() {
      const nome = prompt("Nome do Supermercado:");
      if (nome) { await supabaseClient.from('supermercados').insert([{ nome: nome }]); carregarMercados(); }
    }
  </script>
</body>
</html>
