<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supermarket Scanner</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; padding: 20px; }
    .container { max-width: 450px; margin: auto; }
    input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.2); color: white; }
    .btn { width: 100%; padding: 15px; background: #10b981; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 12px; margin-bottom: 10px; }
    .btn-secondary { background: #3b82f6; }
    .card { margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); }
    .divider { margin: 30px 0; border-top: 1px solid rgba(255,255,255,0.1); }
  </style>
</head>
<body>

  <div class="container">
    <h1>Supermarket Scanner</h1>
    <p>Conectado ao Supabase</p>

    <div class="card">
      <input type="text" id="barcode" placeholder="Escaneie ou digite o código">
      <button class="btn" onclick="buscarProduto()">Buscar Produto</button>
      <div id="resultado" style="display: none;">
        <h3 id="prodNome"></h3>
        <p id="prodPreco"></p>
      </div>
    </div>

    <div class="divider"></div>

    <div class="card">
      <h3>Cadastrar Supermercado</h3>
      <input type="text" id="nomeMercado" placeholder="Ex: Atacadão, Carrefour...">
      <button class="btn btn-secondary" onclick="salvarMercado()">Salvar no Banco</button>
    </div>
  </div>

  <script>
    // 1. Definição das constantes (Troque pelos seus dados reais)
    const URL_BANCO = 'SUA_URL_AQUI';
    const CHAVE_ANON = 'SUA_ANON_KEY_AQUI';

    // 2. Inicialização Global (Garante que o cliente exista antes das funções serem chamadas)
    const supabaseClient = supabase.createClient(URL_BANCO, CHAVE_ANON);

    // ==========================================
    // FUNÇÃO: BUSCAR PRODUTO
    // ==========================================
    async function buscarProduto() {
      const codigo = document.getElementById('barcode').value;
      const resDiv = document.getElementById('resultado');

      if (!codigo) return alert("Digite um código!");

      try {
        const { data, error } = await supabaseClient
          .from('produtos')
          .select(`nome, precos (valor, mercados (nome))`)
          .eq('id', codigo)
          .single();

        if (error) throw error;

        if (data) {
          resDiv.style.display = 'block';
          document.getElementById('prodNome').innerText = data.nome;
          const preco = data.precos[0] ? `R$ ${data.precos[0].valor}` : "Sem preço";
          document.getElementById('prodPreco').innerText = "Último: " + preco;
        }
      } catch (err) {
        console.error("Erro na busca:", err.message);
        alert("Produto não encontrado.");
      }
    }

    // ==========================================
    // FUNÇÃO: SALVAR MERCADO
    // ==========================================
    async function salvarMercado() {
      // Verificação de segurança: O cliente foi carregado?
      if (!supabaseClient) return alert("Erro de conexão com o Supabase.");

      const nomeDigitado = document.getElementById('nomeMercado').value;
      if (!nomeDigitado) return alert("Digite o nome do supermercado.");

      try {
        // .insert([]) -> Enviando os dados para a tabela 'mercados'
        const { data, error } = await supabaseClient
          .from('mercados')
          .insert([{ nome: nomeDigitado }])
          .select();

        // Se houver erro (como falta de permissão RLS), cai aqui
        if (error) throw error;

        alert("Sucesso! '" + nomeDigitado + "' gravado no Supabase.");
        document.getElementById('nomeMercado').value = ""; 
        
      } catch (err) {
        // Log detalhado para te ajudar no estudo via Console (F12)
        console.error("Erro ao gravar dado:", err);
        alert("Erro no banco: " + err.message);
      }
    }
  </script>
</body>
</html>
